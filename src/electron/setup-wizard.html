<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnoClaw Setup</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --border: rgba(255,255,255,0.08);
    --text: rgba(255,255,255,0.85);
    --text-dim: rgba(255,255,255,0.45);
    --accent: #da291c;
    --accent-glow: rgba(218,41,28,0.15);
    --input-bg: #0f0f0f;
    --input-border: rgba(255,255,255,0.1);
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --font-mono: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font); font-size: 13px; line-height: 1.5;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow-y: auto;
    -webkit-app-region: drag;
  }
  .card {
    width: 440px; max-width: calc(100vw - 40px); background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 32px 28px 28px; margin: 20px 0;
    -webkit-app-region: no-drag;
    box-shadow: 0 0 60px rgba(0,0,0,0.5);
  }
  .logo {
    font-size: 20px; font-weight: 700; margin-bottom: 4px;
    letter-spacing: -0.5px;
  }
  .subtitle { color: var(--text-dim); font-size: 12px; margin-bottom: 24px; }
  .field { margin-bottom: 16px; }
  .field label {
    display: block; font-size: 11px; font-weight: 600;
    color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 6px;
  }
  .field input {
    width: 100%; padding: 10px 12px;
    background: var(--input-bg); color: var(--text);
    border: 1px solid var(--input-border); border-radius: 6px;
    font-family: var(--font-mono); font-size: 12px;
    outline: none; transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: rgba(255,255,255,0.15); }

  .actions { display: flex; gap: 10px; margin-top: 24px; }
  .btn {
    flex: 1; padding: 10px 16px; border: none; border-radius: 6px;
    font-family: var(--font); font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-primary {
    background: var(--accent); color: #fff;
  }
  .btn-primary:hover { box-shadow: 0 0 20px var(--accent-glow); }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }
  .btn-secondary {
    background: transparent; color: var(--text-dim);
    border: 1px solid var(--input-border);
  }
  .btn-secondary:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

  .status {
    margin-top: 14px; padding: 10px 12px; border-radius: 6px;
    font-size: 12px; display: none; white-space: pre-wrap;
  }
  .status.error { display: block; background: rgba(218,41,28,0.08); color: #fca5a5; border: 1px solid rgba(218,41,28,0.2); }
  .status.success { display: block; background: rgba(34,197,94,0.06); color: #86efac; border: 1px solid rgba(34,197,94,0.15); }
  .status.info { display: block; background: rgba(59,130,246,0.06); color: #93c5fd; border: 1px solid rgba(59,130,246,0.15); }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--text-dim); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">AnoClaw</div>
  <div class="subtitle">First-time setup — configure your LLM provider</div>

  <div class="field">
    <label>Agent Display Name</label>
    <input id="agentName" type="text" placeholder="My Assistant" value="CEO">
    <span style="font-size:10px;color:var(--text-dim)">This is just a display name. Role is always MainAgent.</span>
  </div>
  <div class="field">
    <label>Provider</label>
    <select id="provider" style="width:100%;padding:10px 12px;background:var(--input-bg);color:var(--text);border:1px solid var(--input-border);border-radius:6px;font-family:var(--font-mono);font-size:12px;outline:none;">
      <option value="openai-compatible">OpenAI Compatible (DeepSeek / vLLM / etc)</option>
      <option value="ollama">Ollama (local)</option>
      <option value="openai">OpenAI</option>
      <option value="anthropic">Anthropic (Claude)</option>
    </select>
  </div>
  <div class="field">
    <label>Model</label>
    <input id="model" type="text" placeholder="deepseek-chat / gpt-4o / claude-sonnet-4-20250514 / llama3.1 ...">
  </div>
  <div class="field">
    <label>API URL</label>
    <input id="apiUrl" type="text" placeholder="https://api.deepseek.com">
    <span style="font-size:10px;color:var(--text-dim)">Leave blank for OpenAI/Anthropic (uses default endpoint)</span>
  </div>
  <div class="field">
    <label>API Key</label>
    <input id="apiKey" type="password" placeholder="sk-...">
  </div>
  <div class="field">
    <label>Context Window (tokens)</label>
    <select id="contextWindow" style="width:100%;padding:10px 12px;background:var(--input-bg);color:var(--text);border:1px solid var(--input-border);border-radius:6px;font-family:var(--font-mono);font-size:12px;outline:none;">
      <option value="128000">128K</option>
      <option value="256000">256K</option>
      <option value="512000">512K</option>
      <option value="1048576">1M</option>
      <option value="2097152">2M</option>
    </select>
    <span style="font-size:10px;color:var(--text-dim)">Match your model's context limit. DeepSeek V4 = 1M, GPT-4o = 128K, Claude = 200K.</span>
  </div>

  <div id="status" class="status"></div>

  <div class="actions">
    <button class="btn btn-secondary" id="btnQuit">Quit</button>
    <button class="btn btn-primary" id="btnTest">Test & Save</button>
  </div>
</div>

<script>
const statusEl = document.getElementById('status');
const btnTest = document.getElementById('btnTest');
const btnQuit = document.getElementById('btnQuit');
const providerEl = document.getElementById('provider');
const apiUrlEl = document.getElementById('apiUrl');
const apiKeyEl = document.getElementById('apiKey');
const modelEl = document.getElementById('model');
const contextEl = document.getElementById('contextWindow');

// Auto-fill defaults per provider
const DEFAULTS = {
  'openai-compatible': { url: 'https://api.deepseek.com' },
  'ollama': { url: 'http://localhost:11434' },
  'openai': { url: 'https://api.openai.com' },
  'anthropic': { url: 'https://api.anthropic.com' },
};

providerEl.addEventListener('change', () => {
  const d = DEFAULTS[providerEl.value];
  if (d && !apiUrlEl.dataset.userEdited) apiUrlEl.value = d.url;
});
apiUrlEl.addEventListener('input', () => { apiUrlEl.dataset.userEdited = '1'; });

function setStatus(cls, msg) {
  statusEl.className = 'status ' + cls;
  statusEl.textContent = msg;
}

async function testConnection() {
  const provider = providerEl.value;
  const apiUrl = apiUrlEl.value.trim();
  const apiKey = apiKeyEl.value.trim();
  const model = modelEl.value.trim();
  const agentName = document.getElementById('agentName').value.trim();
  const contextWindow = parseInt(contextEl.value, 10) || 131072;

  if (!apiUrl || !model) {
    setStatus('error', 'Please fill in all fields.');
    return;
  }
  if (!apiKey && provider !== 'ollama') {
    setStatus('error', 'API Key is required for this provider.');
    return;
  }

  btnTest.disabled = true;
  btnTest.innerHTML = '<span class="spinner"></span>Testing...';
  setStatus('info', 'Testing connection to ' + apiUrl + '...');

  // Build the test request per provider
  let testUrl, testBody, testHeaders;
  if (provider === 'anthropic') {
    testUrl = apiUrl + '/v1/messages';
    testHeaders = { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' };
    testBody = JSON.stringify({ model, max_tokens: 5, messages: [{ role: 'user', content: 'Say ok' }] });
  } else if (provider === 'ollama') {
    testUrl = apiUrl + '/api/chat';
    testHeaders = { 'Content-Type': 'application/json' };
    testBody = JSON.stringify({ model, stream: false, messages: [{ role: 'user', content: 'Say ok' }] });
  } else {
    // openai-compatible / openai
    testUrl = apiUrl + '/v1/chat/completions';
    testHeaders = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey };
    testBody = JSON.stringify({ model, messages: [{ role: 'user', content: 'Say ok' }], max_tokens: 5, temperature: 0 });
  }

  try {
    const resp = await fetch(testUrl, { method: 'POST', headers: testHeaders, body: testBody, signal: AbortSignal.timeout(15000) });
    if (resp.ok) {
      setStatus('success', 'Connection verified ✓\nSaving configuration...');
      try {
        const result = await window.electronAPI.saveSetup({
          agentName, model, apiUrl, apiKey, provider, contextWindow,
        });
        if (result.ok) {
          setStatus('success', 'Setup complete. Launching AnoClaw...');
          setTimeout(() => { window.electronAPI.setupDone(); }, 400);
        } else {
          setStatus('error', 'Failed to save config:\n' + (result.error || 'unknown error'));
          btnTest.disabled = false;
          btnTest.textContent = 'Test & Save';
        }
      } catch (e) {
        setStatus('error', 'Save error: ' + e.message);
        btnTest.disabled = false;
        btnTest.textContent = 'Test & Save';
      }
    } else {
      const body = await resp.text().catch(() => '');
      setStatus('error', 'API returned HTTP ' + resp.status + '.\n' + body.slice(0, 200));
      btnTest.disabled = false;
      btnTest.textContent = 'Test & Save';
    }
  } catch (err) {
    setStatus('error', 'Connection failed:\n' + (err.message || String(err)));
    btnTest.disabled = false;
    btnTest.textContent = 'Test & Save';
  }
}

btnTest.addEventListener('click', testConnection);
btnQuit.addEventListener('click', () => { window.electronAPI.quitSetup(); });
document.getElementById('apiKey').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') testConnection();
});
</script>
</body>
</html>
