<body>
<div class="page-inner">
  <div class="page-header">
    <div class="page-title">Meetings</div>
    <div class="page-actions">
      <button class="btn btn-sm btn-icon" id="btnDiag" title="Test LLM connection">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      </button>
      <button class="btn btn-sm btn-icon" id="btnRefresh">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      </button>
      <button class="btn btn-sm" id="btnCompare" disabled title="Compare selected meetings (select 2+)">Compare</button>
      <button class="btn btn-sm btn-table-toggle" id="btnTableToggle" title="Toggle meeting table view">◉ Table</button>
      <button class="btn btn-sm btn-primary" id="btnNew">+ New</button>
    </div>
  </div>
  <div class="search-row">
    <input class="search-input" id="searchInput" placeholder="Search meetings by topic, goal, or keyword..." spellcheck="false">
    <button class="btn btn-sm" id="btnSearch">Search</button>
    <span class="search-count" id="searchCount"></span>
  </div>
  <div id="app">
    <div class="empty-state">
      <div class="empty-state-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></div>
      <div class="empty-state-text">Loading meetings...</div>
    </div>
  </div>
</div>
<div class="notify" id="notify"></div>

<script>
// ── Helpers ──
const $=id=>document.getElementById(id);
function esc(s){const e=document.createElement('span');e.textContent=String(s==null?'':s);return e.innerHTML}
function notify(msg){const e=$('notify');e.textContent=msg;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),2500)}

// ── Avatar colors ──
const AVATAR_COLORS = ['#57c1ff','#59d499','#ffc533','#ff6161','#9c9c9d','#cdcdcd','#6a6b6c','#434345'];
function avatarColor(name) {
  let h = 0; for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}
function avatarInitial(name) { return (name||'?').charAt(0).toUpperCase(); }

// ── Template icons (SVG strings) ──
const TPL_ICONS = {
  brainstorm: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a7 7 0 0 1 4 12.73V17a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2v-2.27A7 7 0 0 1 12 2z"/><line x1="10" y1="21" x2="14" y2="21"/></svg>`,
  review: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,
  planning: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
  decision: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
  default: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
};

// ── MeetingTable component (inlined from MeetingTable.ts) ──
const MeetingTable = (() => {
  const COLORS = ['#57c1ff','#59d499','#ffc533','#ff6161','#9c9c9d','#cdcdcd','#6a6b6c','#434345'];
  function dColor(n){let h=0;for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return COLORS[Math.abs(h)%COLORS.length]}
  function initials(n){if(!n)return'?';const p=n.split(/[\s_-]+/).filter(Boolean);return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():n.charAt(0).toUpperCase()}
  function tableDims(c){if(c<=4)return{w:280,h:160};if(c<=8)return{w:360,h:200};if(c<=12)return{w:440,h:240};return{w:520,h:280}}

  class MT {
    constructor(el,data,opts={}){this.el=el;this.data=data;this.opts=opts;this.wrapper=null;this.visible=true}
    render(){
      this.el.innerHTML='';
      const ps=this.data.participants||[];
      if(!ps.length){this.el.innerHTML='<div style="text-align:center;padding:24px;font-size:11px;color:var(--c-text-quaternary);">No participants</div>';return}
      const n=ps.length,d=tableDims(n),sr=48;
      const rx=d.w/2+sr+16,ry=d.h/2+sr+16;
      const tw=(rx+sr)*2+32,th=(ry+sr)*2+32;
      const cx=tw/2,cy=th/2;
      const last=(this.data.transcript||[]).slice(-1)[0];
      const speakId=last?(last.speakerId||last.speaker||last.speakerName||null):null;
      const w=document.createElement('div');
      w.className='meeting-table-wrapper';
      w.style.cssText=`width:${tw}px;max-width:100%;margin:0 auto;position:relative;overflow:visible;`;
      this.wrapper=w;
      // Table surface
      const ts=document.createElement('div');
      ts.className='meeting-table-surface';
      ts.style.cssText=`width:${d.w}px;height:${d.h}px;position:absolute;left:${cx-d.w/2}px;top:${cy-d.h/2}px;border-radius:50%;background:#121212;border:1px solid #242728;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;transition:width 0.3s ease,height 0.3s ease;`;
      const tl=document.createElement('div');
      tl.style.cssText='font-size:10px;font-weight:500;color:rgba(255,255,255,0.5);letter-spacing:0.5px;text-align:center;max-width:80%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
      tl.textContent=this.data.topic||'Meeting';
      ts.appendChild(tl);
      const cl=document.createElement('div');
      cl.style.cssText='font-size:9px;color:rgba(255,255,255,0.25);letter-spacing:0.5px;';
      cl.textContent=`${n} participant${n!==1?'s':''}`;
      ts.appendChild(cl);
      w.appendChild(ts);
      // Seats
      for(let i=0;i<n;i++){
        const p=ps[i],ang=(2*Math.PI*i)/n-Math.PI/2;
        const isObs=p.role==='observer'||(this.data.participantRoles&&this.data.participantRoles[p.id]==='observer');
        const oo=isObs?30:0;
        const sx=cx+(rx+oo)*Math.cos(ang),sy=cy+(ry+oo)*Math.sin(ang);
        const col=dColor(p.name||p.id),ini=initials(p.name||p.id);
        const isSpeak=speakId&&(speakId===p.id||speakId===p.name);
        const curR=this.data.currentRound||1;
        const spokeR=(this.data.transcript||[]).some(e=>{const sid=e.speakerId||e.speaker;return e.round===curR&&(sid===p.id||sid===p.name)});
        const se=document.createElement('div');
        se.className='meeting-table-seat'+(isObs?' observer':'');
        se.dataset.pid=p.id;
        const bdr=isSpeak?`3px solid #59d499`:spokeR?`3px solid #57c1ff`:`2px solid ${col}`;
        se.style.cssText=`position:absolute;left:${sx-sr/2}px;top:${sy-sr/2}px;width:${sr}px;height:${sr}px;border-radius:50%;background:#0d0d0d;border:${bdr};display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.2s ease,border-color 0.2s ease;opacity:${isObs?'0.6':'1'};z-index:2;`;
        const ie=document.createElement('span');
        ie.style.cssText=`font-size:14px;font-weight:600;color:${col};pointer-events:none;`;
        ie.textContent=ini;
        se.appendChild(ie);
        if(p.role==='moderator'){const ri=document.createElement('span');ri.style.cssText='position:absolute;top:-4px;right:-4px;font-size:9px;pointer-events:none;background:var(--c-primary);color:var(--c-on-primary);border-radius:3px;padding:1px 3px;';ri.textContent='M';se.appendChild(ri)}
        else if(isObs){const ri=document.createElement('span');ri.style.cssText='position:absolute;top:-4px;right:-4px;font-size:9px;pointer-events:none;background:var(--c-surface-elevated);color:var(--c-text-tertiary);border-radius:3px;padding:1px 3px;';ri.textContent='O';se.appendChild(ri)}
        if(isSpeak){const pr=document.createElement('div');pr.className='meeting-table-pulse-ring';pr.style.cssText='position:absolute;inset:-4px;border-radius:50%;border:2px solid rgba(89,212,153,0.4);animation:meetingTablePulse 2s ease-in-out infinite;pointer-events:none;';se.appendChild(pr)}
        if(spokeR&&!isSpeak){const tr=document.createElement('div');tr.style.cssText='position:absolute;inset:-3px;border-radius:50%;border:2px solid rgba(87,193,255,0.5);animation:meetingTableTurnPulse 3s ease-in-out infinite;pointer-events:none;';se.appendChild(tr)}
        // Tooltip
        const tip=document.createElement('div');
        tip.className='meeting-table-tooltip';
        tip.style.cssText='position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);padding:4px 8px;background:#1a1a1a;border:1px solid #242728;border-radius:4px;font-size:9px;color:rgba(255,255,255,0.8);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:10;display:flex;align-items:center;gap:4px;font-family:var(--font);';
        const rt=p.role?`<span style="font-size:7px;color:rgba(255,255,255,0.4);text-transform:uppercase;">${p.role}</span>`:'';
        tip.innerHTML=`<span style="color:${col};font-weight:500;">${esc(p.name||p.id)}</span>${rt}`;
        se.appendChild(tip);
        se.addEventListener('mouseenter',()=>{se.style.transform='scale(1.15)';tip.style.opacity='1'});
        se.addEventListener('mouseleave',()=>{se.style.transform='scale(1)';tip.style.opacity='0'});
        se.addEventListener('click',()=>{if(this.opts.onParticipantClick)this.opts.onParticipantClick(p)});
        se.style.animation=`meetingTableSeatIn 0.4s cubic-bezier(0.34,1.56,0.64,1) ${i*0.05}s both`;
        w.appendChild(se);
      }
      this.el.appendChild(w);
    }
    update(data){if(data)Object.assign(this.data,data);this.render()}
    destroy(){if(this.wrapper){this.wrapper.remove();this.wrapper=null}}
  }
  return MT;
})();

// ── Theme sync ──
window.addEventListener('message',e=>{if(e.data.type==='anoclaw:theme'){document.documentElement.setAttribute('data-theme',e.data.theme);document.documentElement.setAttribute('data-accent',e.data.accent)}});

// ── App ──
class MeetingApp {
  constructor() {
    this._meetings = []; this._agents = []; this._templates = [];
    this._selectedId = null; this._lastSeq = -1; this._seqTimer = null; this._isSearch = false;
    this._actionChecked = new Set(); this._compareIds = new Set(); this._showCompare = false;
    this._exportOpen = false; this._showTable = true; this._meetingTable = null;
    this._el = $('app');
    $('btnNew').onclick = ()=>this._showCreateForm();
    $('btnRefresh').onclick = ()=>this._load();
    $('btnDiag').onclick = ()=>this._diagnose();
    $('btnSearch').onclick = ()=>this._doSearch();
    $('searchInput').onkeydown = e=>{if(e.key==='Enter')this._doSearch()};
    $('btnTableToggle').onclick = ()=>{ this._showTable=!this._showTable; this._render(); };
  }

  async _load() {
    try {
      const r = await fetch('/api/v1/meetings');
      if (r.ok) { const d = await r.json(); this._meetings = d.meetings || []; }
    } catch { this._meetings = []; }
    this._isSearch = false;
    this._updateSeqPolling();
    this._render();
  }

  async _loadTemplates() {
    try {
      const r = await fetch('/api/v1/meetings/templates');
      if (r.ok) { const d = await r.json(); this._templates = d.templates || []; }
    } catch { this._templates = []; }
  }

  _updateSeqPolling() {
    const hasRunning = this._meetings.some(m=>m.status==='running');
    if (hasRunning && !this._seqTimer) {
      this._seqTimer = setInterval(async()=>{
        try {
          const r = await fetch('/api/v1/meetings/seq');
          if (r.ok) { const d = await r.json(); if (d.seq !== this._lastSeq) { this._lastSeq = d.seq; this._load(); } }
        } catch {}
      }, 1500);
    } else if (!hasRunning && this._seqTimer) {
      clearInterval(this._seqTimer); this._seqTimer = null;
    }
  }

  async _doSearch() {
    const q = ($('searchInput').value || '').trim();
    if (!q) { this._load(); return; }
    try {
      const r = await fetch('/api/v1/meetings/search?q=' + encodeURIComponent(q));
      if (!r.ok) { this._load(); return; }
      const d = await r.json();
      this._isSearch = true;
      this._searchResults = d.results || [];
      this._selectedId = null;
      this._render();
    } catch { this._load(); }
  }

  _render() {
    let html = '';

    if (this._showCompare) {
      html += this._renderCompare();
      this._el.innerHTML = html;
      this._bindEvents();
      // Hide table button in compare mode
      const tableBtn = $('btnTableToggle');
      if (tableBtn) tableBtn.style.display = 'none';
      return;
    }

    if (this._isSearch) {
      html += '<div style="margin-bottom:12px;font-size:10px;color:var(--c-text-quaternary);letter-spacing:0.5px;">Search Results</div>';
      const res = this._searchResults || [];
      if (res.length === 0) {
        html += '<div class="empty-state"><div class="empty-state-text">No matching meetings found</div></div>';
      } else {
        for (const r of res) {
          let label = r.description || '';
          if (label.length > 80) label = label.slice(0, 80) + '...';
          html += `<button class="search-result" onclick="app._showMemory('${esc(r.memoryName)}')">` +
            `<div class="search-result-title">${esc(r.memoryName)}</div>` +
            `<div class="search-result-desc">${esc(label)}</div></button>`;
        }
      }
      html += '<div style="margin-top:12px;"><button class="btn btn-sm" onclick="app._load()">← Back to all meetings</button></div>';
      this._el.innerHTML = html;
      // Hide table button in search view
      const tableBtn2 = $('btnTableToggle');
      if (tableBtn2) tableBtn2.style.display = 'none';
      return;
    }

    // Meeting list + detail
    html += '<div class="meeting-layout">';
    html += '<div class="meeting-list">';
    if (this._meetings.length === 0) {
      html += '<div class="empty-state"><div class="empty-state-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></div><div class="empty-state-text">No meetings yet. Click "+ New" to create one.</div></div>';
    } else {
      for (const m of this._meetings) {
        const dot = `<span class="pulse-dot ${m.status}"></span>`;
        const badge = m.status==='running'?'<span class="meeting-card-badge running">Running</span>'
          : m.status==='completed'?'<span class="meeting-card-badge completed">Done</span>'
          : `<span class="meeting-card-badge idle">${m.status}</span>`;
        const info = `${m.speakerMode} · ${(m.participantIds||[]).length} p · ${(m.transcript||[]).length} turns`;
        const sum = m.summary ? ' · summary ✓' : '';
        const ai = (m.actionItems||[]).length > 0 ? ` · ${m.actionItems.length} actions` : '';

        // Participant avatars for card
        let avatarsHtml = '';
        const pids = m.participantIds || [];
        if (pids.length > 0) {
          avatarsHtml = '<div class="meeting-card-avatars">';
          const showCount = Math.min(pids.length, 4);
          for (let i = 0; i < showCount; i++) {
            const color = avatarColor(pids[i]);
            avatarsHtml += `<span class="avatar-sm" style="background:${color};">${avatarInitial(pids[i])}</span>`;
          }
          if (pids.length > 4) avatarsHtml += `<span class="avatar-count">+${pids.length - 4}</span>`;
          avatarsHtml += '</div>';
        }

        // Compare checkbox
        const cmpChecked = this._compareIds.has(m.id) ? ' checked' : '';
        const cmpHtml = `<div style="position:absolute;top:8px;right:8px;"><div class="action-check${cmpChecked} compare-check" data-mid="${esc(m.id)}" title="Select for comparison"></div></div>`;

        html += `<button class="meeting-card${this._selectedId===m.id?' active':''}" data-id="${esc(m.id)}" style="position:relative;">` +
          cmpHtml +
          `<div class="meeting-card-top">${dot}<span class="meeting-card-title">${esc(m.topic||m.id)}</span>${badge}</div>` +
          `<div class="meeting-card-meta">${esc(info)}<span style="color:var(--c-text-quaternary)">${sum}${ai}</span></div>` +
          avatarsHtml +
          `</button>`;
      }
    }
    html += '</div>'; // end meeting-list

    // Detail
    const sel = this._selectedId ? this._meetings.find(m=>m.id===this._selectedId) : null;
    if (sel) {
      html += '<div class="meeting-detail">' + this._renderDetail(sel) + '</div>';
    }
    html += '</div>'; // end meeting-layout

    this._el.innerHTML = html;
    this._bindEvents();
    this._bindTable();
    // Update table toggle button state
    const tableBtn = $('btnTableToggle');
    if (tableBtn) {
      if (this._showTable) tableBtn.classList.add('active');
      else tableBtn.classList.remove('active');
      tableBtn.style.display = this._selectedId ? '' : 'none';
    }
  }

  _bindEvents() {
    this._el.querySelectorAll('.meeting-card').forEach(el => { el.onclick = ()=>this._select(el.dataset.id); });
    const actionMap = { start: '_start', stop: '_stop', delete: '_delete', 'execute-plan': '_executePlan' };
    this._el.querySelectorAll('[data-act]').forEach(el => {
      const action = el.dataset.act;
      if (action && actionMap[action]) el.onclick = this[actionMap[action]].bind(this);
    });
    // Export dropdown toggle
    const expBtn = this._el.querySelector('[data-act="export"]');
    if (expBtn) expBtn.onclick = (e) => { e.stopPropagation(); this._toggleExportMenu(); };
    // Bind action item checkboxes (exclude compare checkboxes)
    this._el.querySelectorAll('.action-check:not(.compare-check)').forEach(el => {
      el.addEventListener('click', () => {
        const taskId = el.dataset.task;
        el.classList.toggle('checked');
        const taskEl = el.parentElement.querySelector('.action-task');
        if (taskEl) taskEl.classList.toggle('completed');
      });
    });
    // Bind action status selects
    this._el.querySelectorAll('.action-status-select').forEach(el => {
      el.onchange = async () => {
        const taskId = el.dataset.taskId;
        const status = el.value;
        await this._updateActionStatus(taskId, status);
      };
    });
    // Bind compare checkboxes
    this._el.querySelectorAll('.compare-check').forEach(el => {
      el.onclick = () => {
        const mid = el.dataset.mid;
        if (this._compareIds.has(mid)) this._compareIds.delete(mid); else this._compareIds.add(mid);
        el.classList.toggle('checked');
        const btn = $('btnCompare');
        if (btn) btn.disabled = this._compareIds.size < 2;
      };
    });
    const cmpBtn = $('btnCompare');
    if (cmpBtn) cmpBtn.onclick = () => this._doCompare();
  }

  _renderDetail(m) {
    let html = '';
    const isRunning = m.status==='running';
    const isIdle = m.status==='idle';
    const statusBadge = isRunning?'<span class="detail-meta-tag" style="color:var(--c-green);">● Running</span>'
      : m.status==='completed'?'<span class="detail-meta-tag">Completed</span>'
      : '<span class="detail-meta-tag">'+esc(m.status)+'</span>';

    // Participant chips with avatars
    const participants = (m.participantIds||[]).map(id => {
      const color = avatarColor(id);
      return `<span class="participant-chip"><span class="avatar-sm" style="background:${color};border-color:transparent;">${avatarInitial(id)}</span>${esc(id)}</span>`;
    }).join('');

    // Header + actions
    let acts = '';
    if (isIdle) acts += `<button class="btn btn-sm btn-success" data-act="start"><svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> Start</button>`;
    if (isRunning) acts += `<button class="btn btn-sm btn-danger" data-act="stop"><svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Stop</button>`;
    if (m.status === 'completed' || m.decisionPlan) acts += `<button class="btn btn-sm btn-primary" data-act="execute-plan">Execute Plan</button>`;
    // Export with format dropdown
    acts += `<div class="export-dropdown"><button class="btn btn-sm" data-act="export"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Export ▾</button>`;
    const expOpen = this._exportOpen ? 'block' : 'none';
    acts += `<div class="export-menu" id="exportMenu" style="display:${expOpen};">`;
    acts += `<button class="export-menu-item" data-fmt="markdown">Markdown (.md)</button>`;
    acts += `<button class="export-menu-item" data-fmt="json">{ } JSON (.json)</button>`;
    acts += `<button class="export-menu-item" data-fmt="text">Plain Text (.txt)</button>`;
    acts += `</div></div>`;

    acts += `<button class="btn btn-sm btn-danger" data-act="delete"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> Delete</button>`;

    const runningBar = isRunning
      ? `<div class="running-indicator"><div class="running-spinner"></div><span class="running-indicator-text">Meeting in progress${m.currentRound?' — Round '+m.currentRound+'/'+m.maxRounds:''}</span></div>`
      : '';

    // Duration bar
    const dur = m.duration;
    let durationHtml = '';
    if (dur && dur.startedAt) {
      durationHtml = `<div class="duration-bar">
        <span class="duration-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
        <div class="duration-info">
          <div class="duration-elapsed">${esc(dur.elapsedFormatted || '—')}</div>
          <div class="duration-detail">Started ${new Date(dur.startedAt).toLocaleTimeString()}${dur.estimatedEnd ? ' · Est. end ' + new Date(dur.estimatedEnd).toLocaleTimeString() : ''}</div>
        </div>
      </div>`;
    }

    // Progress bar
    const totalTurns = (m.participantIds||[]).length * (m.maxRounds||2);
    const completedTurns = (m.transcript||[]).length;
    const progressPct = totalTurns > 0 ? Math.min(100, Math.round((completedTurns / totalTurns) * 100)) : 0;
    const progressHtml = `<div style="margin:8px 0;">
      <div class="progress-label"><span>Progress</span><span>${completedTurns}/${totalTurns} turns · ${progressPct}%</span></div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${progressPct}%"></div></div>
    </div>`;

    html += `<div class="section">
      <div class="detail-header"><div>
        <div class="detail-topic">${esc(m.topic)}</div>
        <div class="detail-goal">${esc(m.goal)}</div>
        <div class="detail-meta">
          <span class="detail-meta-tag">${esc(m.speakerMode)}</span>
          <span class="detail-meta-tag">${esc(m.meetingStyle || 'dialectic')}</span>
          ${m.toolUseEnabled === false ? '<span class="detail-meta-tag">tools off</span>' : '<span class="detail-meta-tag">tool evidence</span>'}
          <span class="detail-meta-tag">${m.maxRounds||2} rounds</span>
          <span class="detail-meta-tag">${(m.participantIds||[]).length} participants</span>
          ${statusBadge}
        </div>
        <div class="participant-chips">${participants}</div>
      </div><div class="detail-actions">${acts}</div></div>
    </div>${runningBar}${durationHtml}${progressHtml}`;

    const ctx = m.contextBundle;
    if (ctx) {
      const terms = (ctx.terms || []).map(t => `<span class="evidence-term">${esc(t)}</span>`).join('');
      const warnings = (ctx.errors || []).length
        ? `<div style="font-size:10px;color:var(--c-yellow);margin-top:8px;">${esc((ctx.errors || []).slice(0,3).join(' | '))}</div>`
        : '';
      html += `<div class="section">
        <div class="section-legend">Project Evidence</div>
        <div class="evidence-grid">
          <div class="evidence-stat"><strong>${ctx.fileCount || 0}</strong><span>files read</span></div>
          <div class="evidence-stat"><strong>${ctx.grepCount || 0}</strong><span>search groups</span></div>
          <div class="evidence-stat"><strong>${ctx.memoryCount || 0}</strong><span>memories</span></div>
        </div>
        ${terms ? `<div class="evidence-terms">${terms}</div>` : '<div style="font-size:10px;color:var(--c-text-quaternary);">No context terms extracted yet</div>'}
        ${warnings}
      </div>`;
    } else if (m.contextEnabled !== false) {
      html += `<div class="section">
        <div class="section-legend">Project Evidence</div>
        <div style="font-size:11px;color:var(--c-text-quaternary);">Read-only project context will be collected when the meeting starts.</div>
      </div>`;
    }

    // Meeting Table (collapsible)
    const tableVisible = this._showTable;
    const tableToggleIcon = tableVisible ? '▾' : '▸';
    html += `<div class="meeting-table-section">
      <div class="meeting-table-toggle" onclick="app._toggleTable()">
        <span class="meeting-table-toggle-icon${tableVisible?' open':''}">${tableToggleIcon}</span>
        <span style="font-size:9px;color:var(--c-text-quaternary);letter-spacing:1px;text-transform:uppercase;font-weight:500;">Meeting Table</span>
        <span style="font-size:9px;color:var(--c-text-quaternary);margin-left:auto;">${(m.participantIds||[]).length} seats</span>
      </div>
      <div class="meeting-table-container" id="meetingTableContainer" style="display:${tableVisible?'flex':'none'};"></div>
    </div>`;

    // Timeline (if running or completed with rounds)
    if (m.maxRounds && m.maxRounds > 1) {
      html += '<div class="section"><div class="section-legend">Timeline</div><div class="timeline">';
      for (let r = 1; r <= m.maxRounds; r++) {
        const isCurrent = isRunning && m.currentRound === r;
        const isPast = isRunning && m.currentRound > r;
        const isFuture = !isRunning || m.currentRound < r;
        const dotClass = isCurrent ? 'active' : isPast ? 'completed' : '';
        const roundEntries = (m.transcript||[]).filter(e => e.round === r);
        const speakerNames = [...new Set(roundEntries.map(e => e.speakerName || e.speakerId))];
        html += `<div class="timeline-item">
          <div class="timeline-dot ${dotClass}"></div>
          <div class="timeline-label">Round ${r}${isCurrent ? ' — Active' : isPast ? ' — Complete' : ''}</div>
          <div class="timeline-content">${roundEntries.length} turns${speakerNames.length ? ' · ' + speakerNames.join(', ') : ''}</div>
        </div>`;
      }
      html += '</div></div>';
    }

    // Transcript
    html += '<div class="section"><div class="section-legend">Transcript</div>';
    if (m.transcript && m.transcript.length > 0) {
      let lastRound = 0;
      for (const entry of m.transcript) {
        if (entry.round !== lastRound) {
          html += `<div class="round-header">Round ${entry.round}</div>`;
          lastRound = entry.round;
        }
        const isErr = entry.content && entry.content.startsWith('[Error:');
        const speakerName = entry.speakerName || entry.speakerId || 'Unknown';
        const speakerColor = avatarColor(speakerName);
        // Role badge for this speaker
        const roles = m.participantRoles || {};
        const role = roles[entry.speakerId];
        const roleHtml = role ? `<span style="font-size:8px;padding:1px 4px;border-radius:3px;background:var(--c-surface-elevated);color:var(--c-text-quaternary);margin-left:4px;">${esc(role)}</span>` : '';
        html += `<div class="transcript-entry"><div class="transcript-header">
          <span class="avatar-sm" style="background:${speakerColor};">${avatarInitial(speakerName)}</span>
          <span class="transcript-speaker" style="color:${speakerColor};">${esc(speakerName)}${roleHtml}</span>
          <span class="transcript-round">R${entry.round}</span>
        </div>` +
          `<div class="transcript-content${isErr?' transcript-error':''}">${esc(entry.content)}</div></div>`;
      }
    } else {
      html += '<div style="font-size:11px;color:var(--c-text-quaternary);padding:12px 0;">No transcript yet</div>';
    }
    html += '</div>';

    // Summary
    if (m.summary) {
      html += `<div class="section"><div class="section-legend">Summary</div><div class="summary-text">${esc(m.summary)}</div></div>`;
    }

    if (m.decisionPlan) {
      const planPath = m.planFile?.path || `data/meetings/plans/${esc(m.id)}/plan.md`;
      html += `<div class="section"><div class="section-legend">Indexed Plan</div><div style="font-size:10px;color:var(--c-text-tertiary);margin-bottom:8px;">${esc(planPath)}</div><div class="plan-text">${esc(m.decisionPlan)}</div></div>`;
    }

    if (m.debateLedger && m.debateLedger.length > 0) {
      html += '<div class="section"><div class="section-legend">Debate Ledger</div>';
      for (const d of m.debateLedger.slice(-8)) {
        html += `<div style="padding:8px 0;border-bottom:1px solid var(--c-hairline);">
          <div style="font-size:10px;color:var(--c-text-primary);margin-bottom:4px;">R${d.round} ${esc(d.phase||'')} · ${esc(d.speakerName||d.speakerId||'')}</div>
          ${d.position ? `<div style="font-size:11px;color:var(--c-text-secondary);"><strong>Position:</strong> ${esc(d.position)}</div>` : ''}
          ${d.challenge ? `<div style="font-size:11px;color:var(--c-yellow);"><strong>Challenge:</strong> ${esc(d.challenge)}</div>` : ''}
          ${d.decisionImpact ? `<div style="font-size:11px;color:var(--c-green);"><strong>Impact:</strong> ${esc(d.decisionImpact)}</div>` : ''}
        </div>`;
      }
      html += '</div>';
    }

    if (m.toolLedger && m.toolLedger.length > 0) {
      html += '<div class="section"><div class="section-legend">Tool Ledger</div>';
      for (const turn of m.toolLedger.slice(-6)) {
        html += `<div style="font-size:10px;color:var(--c-text-tertiary);margin:6px 0 4px;">R${turn.round} ${esc(turn.phase||'')} · ${esc(turn.speakerName||turn.speakerId||'')}</div>`;
        for (const entry of (turn.entries||[]).slice(0,3)) {
          html += `<div style="font-size:11px;color:var(--c-text-secondary);padding:4px 0;">${esc(entry.toolName)} · ${esc(entry.query||'')}<div style="font-size:10px;color:var(--c-text-quaternary);">${esc(entry.summary||'').slice(0,220)}</div></div>`;
        }
      }
      html += '</div>';
    }

    // Speaker analytics
    const analytics = m.analytics;
    if (analytics && analytics.perSpeaker && Object.keys(analytics.perSpeaker).length > 0) {
      html += '<div class="section"><div class="section-legend">Speaker Analytics</div>';
      const maxTurns = Math.max(...Object.values(analytics.perSpeaker).map(s => s.turns), 1);
      for (const [sid, s] of Object.entries(analytics.perSpeaker)) {
        const color = avatarColor(s.name);
        const barW = Math.round((s.turns / maxTurns) * 100);
        html += `<div class="speaker-stat">
          <span class="avatar-sm" style="background:${color};">${avatarInitial(s.name)}</span>
          <span class="speaker-stat-name">${esc(s.name)}</span>
          <div class="speaker-bar-wrap"><div class="speaker-bar-fill" style="width:${barW}%;background:${color};"></div></div>
          <span class="speaker-stat-val">${s.turns} turns · ${s.avgChars} avg chars</span>
        </div>`;
      }
      if (analytics.mostActive) html += `<div style="font-size:9px;color:var(--c-text-quaternary);margin-top:6px;">Most active: ${esc(analytics.mostActive.name)} (${analytics.mostActive.turns} turns)</div>`;
      html += '</div>';
    }

    // Participant activity heatmap
    if (m.transcript && m.transcript.length > 0) {
      html += '<div class="section"><div class="section-legend">Activity Heatmap</div><div class="heatmap">';
      for (const entry of m.transcript) {
        const color = avatarColor(entry.speakerName || entry.speakerId);
        const opacity = Math.min(1, 0.3 + (entry.content || '').length / 800);
        html += `<div class="heatmap-cell" style="background:${color};opacity:${opacity.toFixed(2)};" data-tip="${esc(entry.speakerName||'')} R${entry.round}: ${(entry.content||'').length} chars"></div>`;
      }
      html += '</div></div>';
    }

    // Action items with status tracking
    if (m.actionItems && m.actionItems.length > 0) {
      html += '<div class="section"><div class="section-legend">Action Items</div>';
      const statuses = ['pending','in-progress','done','blocked'];
      const statusColors = {pending:'var(--c-yellow)','in-progress':'var(--c-blue)',done:'var(--c-green)',blocked:'var(--c-red)'};
      for (const item of m.actionItems) {
        const pc = item.priority||'medium';
        const taskKey = esc(item.task).substring(0, 30);
        const checked = (item.status==='done'||this._actionChecked.has(taskKey)) ? ' checked' : '';
        const completedClass = (item.status==='done'||this._actionChecked.has(taskKey)) ? ' completed' : '';
        const assigneeColor = avatarColor(item.assignee || '');
        const itemStatus = item.status || 'pending';
        const statusOpts = statuses.map(s => `<option value="${s}"${s===itemStatus?' selected':''}>${s}</option>`).join('');
        html += `<div class="action-item">
          <div class="action-check${checked}" data-task="${taskKey}"></div>
          <span class="action-task${completedClass}">${esc(item.task)}</span>
          <div class="action-badges">
            <select class="action-status-select" data-task-id="${esc(item.id)}" style="color:${statusColors[itemStatus]||'var(--c-text-secondary)'};">${statusOpts}</select>
            <span class="action-priority ${pc}">${esc(item.priority)}</span>
            <span class="action-assignee" style="border-color:${assigneeColor}30;">
              <span class="avatar-sm" style="background:${assigneeColor};width:14px;height:14px;font-size:7px;margin-right:3px;">${avatarInitial(item.assignee)}</span>${esc(item.assignee)}
            </span>
          </div>
        </div>`;
      }
      html += '</div>';
    }

    return html;
  }

  _select(id) { this._selectedId = id; this._exportOpen = false; this._render(); }
  _toggleTable() { this._showTable = !this._showTable; this._render(); }

  /** Bind the MeetingTable component to the detail view */
  _bindTable() {
    if (!this._selectedId) { this._meetingTable = null; return; }
    const sel = this._meetings.find(m => m.id === this._selectedId);
    if (!sel) { this._meetingTable = null; return; }
    const container = document.getElementById('meetingTableContainer');
    if (!container) { this._meetingTable = null; return; }

    // Build participant objects from IDs and roles
    const roles = sel.participantRoles || {};
    const participants = (sel.participantIds || []).map(id => ({
      id,
      name: id,
      role: roles[id] || undefined,
    }));

    const tableData = {
      id: sel.id,
      topic: sel.topic,
      participants,
      transcript: sel.transcript || [],
      currentRound: sel.currentRound || 1,
      maxRounds: sel.maxRounds || 2,
      status: sel.status,
      participantRoles: roles,
    };

    this._meetingTable = new MeetingTable(container, tableData, {
      onParticipantClick: (p) => {
        // Show participant info in a toast
        const role = roles[p.id] || 'participant';
        const turns = (sel.transcript || []).filter(e => (e.speakerId || e.speaker) === p.id).length;
        notify(`${p.name} — ${role} · ${turns} turns`);
      },
    });
    this._meetingTable.render();
  }
  async _start() { if (!this._selectedId) return; try { const r = await fetch(`/api/v1/meetings/${this._selectedId}/start`,{method:'POST'}); if (!r.ok) { notify('Failed'); return; } notify('Started'); this._load(); } catch { notify('Error'); } }
  async _stop() { if (!this._selectedId) return; try { await fetch(`/api/v1/meetings/${this._selectedId}/stop`,{method:'POST'}); notify('Stopped'); this._load(); } catch { notify('Error'); } }
  async _delete() { if (!this._selectedId) return; const dlg = window.anoclaw?.dialog?.confirm; if (!(dlg ? await dlg('Delete this meeting?') : confirm('Delete?'))) return; try { await fetch(`/api/v1/meetings/${this._selectedId}`,{method:'DELETE'}); this._selectedId = null; notify('Deleted'); this._load(); } catch { notify('Error'); } }
  async _executePlan() {
    if (!this._selectedId) return;
    notify('Creating execution session...');
    try {
      const r = await fetch(`/api/v1/meetings/${this._selectedId}/plan/session`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({}),
      });
      const d = await r.json();
      if (!r.ok) {
        notify(d.error || 'Execution session failed');
        if (d.executionPrompt) this._showExecutionPrompt(d);
        return;
      }
      const handedOff = await this._handoffExecutionPrompt(d);
      notify(handedOff ? 'Execution session ready' : 'Execution session created');
      this._showExecutionPrompt(d, handedOff);
      this._load();
    } catch (err) {
      notify('Execution setup error: ' + err.message);
    }
  }

  _handoffExecutionPrompt(data) {
    const sessionId = data.session?.id;
    const prompt = data.executionPrompt || '';
    if (!sessionId || !prompt || !window.parent || window.parent === window) return Promise.resolve(false);
    const id = 'handoff-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
    return new Promise(resolve => {
      const timer = setTimeout(() => {
        window.removeEventListener('message', onMessage);
        resolve(false);
      }, 2500);
      const onMessage = (e) => {
        const msg = e.data || {};
        if (msg.type !== 'anoclaw:session:handoff-result' || msg.id !== id) return;
        clearTimeout(timer);
        window.removeEventListener('message', onMessage);
        resolve(!!msg.ok);
      };
      window.addEventListener('message', onMessage);
      window.parent.postMessage({
        type: 'anoclaw:session:handoff',
        id,
        sessionId,
        prompt,
      }, '*');
    });
  }

  _showExecutionPrompt(data, handedOff = false) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    const sessionId = data.session?.id || '';
    const planPath = data.planFile?.path || '';
    overlay.innerHTML = `<div class="modal-card">
      <button class="modal-close" id="planPromptClose">x</button>
      <div class="section-legend" style="margin-bottom:14px;">Plan Execution</div>
      <div style="font-size:11px;color:${handedOff?'var(--c-green)':'var(--c-yellow)'};margin-bottom:8px;">${handedOff?'Prompt injected into the execution session.':'Prompt created. Copy it into the execution session if automatic handoff did not occur.'}</div>
      ${sessionId ? `<div style="font-size:11px;color:var(--c-text-secondary);margin-bottom:8px;">Session: <code>${esc(sessionId)}</code></div>` : ''}
      ${planPath ? `<div style="font-size:11px;color:var(--c-text-secondary);margin-bottom:8px;">Plan: <code>${esc(planPath)}</code></div>` : ''}
      <textarea class="textarea" rows="12" readonly id="planExecutionPrompt">${esc(data.executionPrompt || '')}</textarea>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button class="btn btn-primary" id="copyPlanPrompt">Copy Prompt</button>
        <button class="btn" id="closePlanPrompt">Close</button>
      </div>
    </div>`;
    document.body.appendChild(overlay);
    const close = () => overlay.remove();
    overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
    overlay.querySelector('#planPromptClose')?.addEventListener('click', close);
    overlay.querySelector('#closePlanPrompt')?.addEventListener('click', close);
    overlay.querySelector('#copyPlanPrompt')?.addEventListener('click', async () => {
      const text = overlay.querySelector('#planExecutionPrompt')?.value || '';
      try { await navigator.clipboard.writeText(text); notify('Prompt copied'); }
      catch { notify('Copy failed'); }
    });
  }
  _toggleExportMenu() {
    this._exportOpen = !this._exportOpen;
    const menu = document.getElementById('exportMenu');
    if (menu) menu.style.display = this._exportOpen ? 'block' : 'none';
    if (this._exportOpen) {
      // Bind format items
      document.querySelectorAll('.export-menu-item').forEach(el => {
        el.onclick = (e) => {
          e.stopPropagation();
          const fmt = el.dataset.fmt;
          this._exportFormat(fmt);
          this._exportOpen = false;
        };
      });
      // Close on outside click
      setTimeout(() => {
        const handler = () => { this._exportOpen = false; const m = document.getElementById('exportMenu'); if(m) m.style.display='none'; document.removeEventListener('click', handler); };
        document.addEventListener('click', handler);
      }, 0);
    }
  }

  async _exportFormat(format) {
    if (!this._selectedId) return;
    try {
      const r = await fetch(`/api/v1/meetings/${this._selectedId}/export?format=${format}`);
      if (!r.ok) { notify('Export failed'); return; }
      const d = await r.json();
      if (format === 'json') {
        const blob = new Blob([JSON.stringify(d.meeting, null, 2)], {type:'application/json'});
        const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = d.filename || `meeting-${this._selectedId}.json`; a.click(); URL.revokeObjectURL(url);
      } else {
        const ct = format === 'text' ? 'text/plain' : 'text/markdown';
        const blob = new Blob([d.text], {type:ct});
        const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = d.filename || 'meeting-export.md'; a.click(); URL.revokeObjectURL(url);
      }
      notify('Exported as ' + format);
    } catch { notify('Export error'); }
  }

  async _updateActionStatus(taskId, status) {
    if (!this._selectedId) return;
    try {
      await fetch(`/api/v1/meetings/${this._selectedId}/action-status`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({taskId, status})
      });
      notify('Status updated');
      this._load();
    } catch { notify('Error'); }
  }

  _renderCompare() {
    if (this._compareData && this._compareData.meetings) {
      let html = '<div style="margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;">';
      html += '<div style="font-size:10px;color:var(--c-text-quaternary);letter-spacing:0.5px;">Meeting Comparison</div>';
      html += '<button class="btn btn-sm" onclick="app._showCompare=false;app._render();">← Back</button></div>';
      html += '<div class="compare-grid" style="grid-template-columns:repeat(' + this._compareData.meetings.length + ', 1fr);">';
      for (const m of this._compareData.meetings) {
        const dur = m.duration || {};
        html += `<div class="compare-card">
          <h3>${esc(m.topic)}</h3>
          <div style="font-size:10px;color:var(--c-text-tertiary);margin-bottom:8px;">${esc(m.goal)}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;">
            <span class="detail-meta-tag">${esc(m.speakerMode)}</span>
            <span class="detail-meta-tag">${m.maxRounds} rounds</span>
            <span class="detail-meta-tag">${m.participantCount} participants</span>
            <span class="detail-meta-tag">${m.transcriptCount} turns</span>
            <span class="detail-meta-tag">${m.actionItemCount} actions</span>
            ${m.hasSummary ? '<span class="detail-meta-tag">summary ✓</span>' : ''}
          </div>`;
        if (dur.elapsedFormatted) html += `<div style="font-size:10px;color:var(--c-text-secondary);margin-bottom:6px;">Duration: ${esc(dur.elapsedFormatted)}</div>`;
        if (m.analytics && m.analytics.mostActive) html += `<div style="font-size:9px;color:var(--c-text-quaternary);">Most active: ${esc(m.analytics.mostActive.name)} (${m.analytics.mostActive.turns} turns)</div>`;
        html += `<div style="font-size:9px;color:var(--c-text-quaternary);margin-top:4px;">Created: ${new Date(m.createdAt).toLocaleDateString()}</div>`;
        html += '</div>';
      }
      html += '</div>';
      return html;
    }
    return '<div class="empty-state"><div class="empty-state-text">Select meetings to compare</div></div>';
  }

  async _doCompare() {
    if (this._compareIds.size < 2) { notify('Select 2+ meetings'); return; }
    try {
      const r = await fetch('/api/v1/meetings/compare', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ids: Array.from(this._compareIds)})
      });
      if (!r.ok) { notify('Compare failed'); return; }
      this._compareData = await r.json();
      this._showCompare = true;
      this._render();
    } catch { notify('Error'); }
  }

  async _diagnose() {
    notify('Testing LLM connection...');
    try {
      const r = await fetch('/api/v1/plugins/meeting/diagnose/llm');
      const d = await r.json();
      if (d.ok) notify('LLM OK (' + d.contentLength + ' chars, finish: ' + d.finishReason + ')');
      else notify('LLM ERROR: ' + (d.error || 'unknown'));
    } catch (err) { notify('Diagnose failed: ' + err.message); }
  }

  async _showCreateForm() {
    await this._loadTemplates();
    let agents = [];
    try { const r = await fetch('/api/v1/plugins/meeting/agents'); if (r.ok) { const d = await r.json(); agents = d.agents||[]; } } catch {}
    const selectedAgents = new Set();
    const selectedTemplate = {current: null};

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';

    let html = '<div class="modal-card">';
    html += '<button class="modal-close" id="modalClose">✕</button>';
    html += '<div class="section-legend" style="margin-bottom:16px;font-size:11px;">New Meeting</div>';

    // Template selector with icons
    if (this._templates.length > 0) {
      html += '<div class="form-row"><label class="label">Template (optional)</label><div class="template-grid">';
      html += `<button class="template-option selected" data-tpl="">
        <div class="template-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
        <div><div class="template-name">Custom</div><div class="template-desc">Start from scratch</div></div>
      </button>`;
      for (const t of this._templates) {
        const icon = TPL_ICONS[t.id] || TPL_ICONS.default;
        html += `<button class="template-option" data-tpl="${esc(t.id)}" data-tpl-name="${esc(t.name)}" data-tpl-goal="${esc(t.goal)}" data-tpl-mode="${esc(t.speakerMode)}" data-tpl-rounds="${t.maxRounds}" data-tpl-cat="${esc(t.category||'')}" data-tpl-dur="${esc(t.estimatedDuration||'')}">
          <div class="template-icon">${icon}</div>
          <div><div class="template-name">${esc(t.name)}</div><div class="template-desc">${esc(t.suggestion||t.goal||'')}</div></div>
        </button>`;
      }
      html += '</div>';
      // Template preview container
      html += '<div id="tplPreview" style="display:none;"></div>';
      html += '</div>';
    }

    html += '<div class="form-row"><label class="label">Topic</label><input class="input" id="fTopic" placeholder="What to discuss"></div>';
    html += '<div class="form-row"><label class="label">Goal</label><textarea class="textarea" id="fGoal" rows="2" placeholder="What should be achieved"></textarea></div>';
    html += '<div class="form-row"><label class="label">Participants</label><div class="agent-grid">';
    if (agents.length === 0) html += '<div style="font-size:10px;color:var(--c-text-quaternary);padding:8px 0;">No agents available</div>';
    else { for (const a of agents) {
      const n = a.name||a.displayName||a.id;
      const color = avatarColor(n);
      html += `<button class="agent-option" data-id="${esc(a.id)}">
        <span class="check"></span>
        <span class="agent-avatar" style="background:${color};">${avatarInitial(n)}</span>
        ${esc(n)}
      </button>`;
    } }
    html += '</div></div>';
    html += '<div class="form-row-double"><div><label class="label">Mode</label><select class="select" id="fMode"><option value="round-robin">Round Robin</option><option value="moderator">Moderator</option><option value="auto">Auto</option></select></div><div><label class="label">Rounds</label><input class="input" id="fRounds" type="number" value="2" min="1" max="10"></div></div>';
    html += '<div class="form-row-double"><div><label class="label">Meeting Style</label><select class="select" id="fMeetingStyle"><option value="dialectic">Dialectic debate</option><option value="workshop">Production workshop</option></select></div><div><label class="label">Tool Evidence</label><div class="recurring-toggle" style="height:32px;align-items:center;"><input type="checkbox" id="fToolUseEnabled" checked><label for="fToolUseEnabled" style="font-size:10px;color:var(--c-text-tertiary);">Read-only probes per turn</label></div></div></div>';
    html += '<div class="form-row-double"><div><label class="label">Allowed Tools</label><input class="input" id="fAllowedTools" value="memory.search,Grep" placeholder="memory.search,Grep,MeetingWebSearch"></div><div><label class="label">Probe Budget</label><input class="input" id="fToolProbeBudget" type="number" value="2" min="0" max="6"></div></div>';
    html += '<div class="form-row-double"><div><label class="label">Quality Threshold</label><input class="input" id="fMinimumQualityScore" type="number" value="70" min="0" max="100"></div><div><label class="label">Quality Gate</label><div class="recurring-toggle" style="height:32px;align-items:center;"><input type="checkbox" id="fEnforceQualityGate" checked><label for="fEnforceQualityGate" style="font-size:10px;color:var(--c-text-tertiary);">Append remediation if weak</label></div></div></div>';
    html += '<div class="form-row"><label class="label">Probe Templates JSON</label><textarea class="textarea" id="fToolProbeTemplates" rows="2" placeholder=\'[{"toolName":"MeetingWebSearch","purpose":"Fresh market signal","params":{"query":"{{topic}} {{term}}"}}]\'></textarea></div>';

    html += '<div class="form-row"><label class="label">Project Evidence</label>';
    html += '<div class="recurring-toggle"><input type="checkbox" id="fContextEnabled" checked><label for="fContextEnabled" style="font-size:10px;color:var(--c-text-tertiary);">Collect read-only project context before discussion</label></div>';
    html += '<input class="input" id="fContextQuery" style="margin-top:6px;" placeholder="Optional context query, defaults to topic + goal">';
    html += '<textarea class="textarea" id="fContextFiles" rows="2" style="margin-top:6px;" placeholder="Optional extra files, one per line"></textarea>';
    html += '</div>';

    // Recurring meeting toggle
    html += '<div class="form-row"><label class="label">Recurring</label>';
    html += '<div class="recurring-toggle"><input type="checkbox" id="fRecurring"><label for="fRecurring" style="font-size:10px;color:var(--c-text-tertiary);">Repeat this meeting</label></div>';
    html += '<div id="recurringOptions" style="display:none;margin-top:6px;">';
    html += '<select class="select" id="fRecurringPattern"><option value="daily">Daily (weekdays)</option><option value="weekly">Weekly</option><option value="biweekly">Bi-weekly</option><option value="monthly">Monthly</option></select>';
    html += '</div></div>';

    // Compare checkbox for list
    html += '<div style="font-size:9px;color:var(--c-text-quaternary);margin:8px 0 0;letter-spacing:0.5px;">Tip: Use compare checkboxes in the meeting list to compare meetings side-by-side.</div>';

    html += '<div style="display:flex;gap:8px;margin-top:16px;"><button class="btn btn-primary" id="fCreate">Create</button><button class="btn" id="fCancel">Cancel</button></div>';
    html += '</div>';

    overlay.innerHTML = html;
    document.body.appendChild(overlay);

    const close = () => { overlay.remove(); };
    overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
    overlay.querySelector('#modalClose')?.addEventListener('click', close);

    // Template binding
    const tplOptions = overlay.querySelectorAll('.template-option');
    const tplPreview = overlay.querySelector('#tplPreview');
    tplOptions.forEach(el => {
      el.onclick = () => {
        tplOptions.forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        selectedTemplate.current = el.dataset.tpl;
        const tpl = this._templates.find(t => t.id === el.dataset.tpl);
        if (tpl) {
          const topicEl = overlay.querySelector('#fTopic');
          const goalEl = overlay.querySelector('#fGoal');
          const modeEl = overlay.querySelector('#fMode');
          const roundsEl = overlay.querySelector('#fRounds');
          if (topicEl && !topicEl._manual) topicEl.value = tpl.name;
          if (goalEl && !goalEl._manual) goalEl.value = tpl.goal;
          if (modeEl) modeEl.value = tpl.speakerMode;
          if (roundsEl) roundsEl.value = String(tpl.maxRounds);
          // Show template preview
          if (tplPreview) {
            tplPreview.style.display = 'block';
            tplPreview.innerHTML = `<div class="template-preview">
              <div class="template-preview-title">${esc(tpl.name)} Preview</div>
              <div class="template-preview-row"><span class="template-preview-label">Goal:</span><span>${esc(tpl.goal)}</span></div>
              <div class="template-preview-row"><span class="template-preview-label">Mode:</span><span>${esc(tpl.speakerMode)}</span></div>
              <div class="template-preview-row"><span class="template-preview-label">Rounds:</span><span>${tpl.maxRounds}</span></div>
              <div class="template-preview-row"><span class="template-preview-label">Category:</span><span>${esc(tpl.category||'—')}</span></div>
              <div class="template-preview-row"><span class="template-preview-label">Est. Duration:</span><span>${esc(tpl.estimatedDuration||'—')}</span></div>
            </div>`;
          }
        } else {
          if (tplPreview) tplPreview.style.display = 'none';
        }
      };
    });

    const topicInput = overlay.querySelector('#fTopic');
    const goalInput = overlay.querySelector('#fGoal');
    if (topicInput) topicInput.oninput = function() { this._manual = true; };
    if (goalInput) goalInput.oninput = function() { this._manual = true; };

    // Recurring toggle
    const recurringCb = overlay.querySelector('#fRecurring');
    const recurringOpts = overlay.querySelector('#recurringOptions');
    if (recurringCb && recurringOpts) {
      recurringCb.onchange = () => { recurringOpts.style.display = recurringCb.checked ? 'block' : 'none'; };
    }

    // Agent selection
    overlay.querySelectorAll('.agent-option').forEach(el => {
      el.onclick = () => {
        const id = el.dataset.id;
        if (selectedAgents.has(id)) selectedAgents.delete(id); else selectedAgents.add(id);
        el.classList.toggle('selected');
      };
    });

    overlay.querySelector('#fCancel')?.addEventListener('click', close);
    overlay.querySelector('#fCreate')?.addEventListener('click', async() => {
      const topic = (overlay.querySelector('#fTopic')?.value||'').trim();
      const goal = (overlay.querySelector('#fGoal')?.value||'').trim();
      if (!topic) { notify('Topic required'); return; }
      if (!goal) { notify('Goal required'); return; }
      if (selectedAgents.size < 2) { notify('Select 2+ participants'); return; }
      try {
        const contextFiles = (overlay.querySelector('#fContextFiles')?.value||'').split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
        const allowedToolNames = (overlay.querySelector('#fAllowedTools')?.value||'').split(',').map(s=>s.trim()).filter(Boolean);
        let toolProbeTemplates = [];
        const templateRaw = (overlay.querySelector('#fToolProbeTemplates')?.value||'').trim();
        if (templateRaw) {
          try { toolProbeTemplates = JSON.parse(templateRaw); }
          catch { notify('Probe Templates must be valid JSON'); return; }
          if (!Array.isArray(toolProbeTemplates)) { notify('Probe Templates JSON must be an array'); return; }
        }
        const body = {
          topic, goal,
          participantIds: Array.from(selectedAgents),
          speakerMode: overlay.querySelector('#fMode')?.value||'round-robin',
          maxRounds: parseInt(overlay.querySelector('#fRounds')?.value||'2'),
          meetingStyle: overlay.querySelector('#fMeetingStyle')?.value||'dialectic',
          toolUseEnabled: overlay.querySelector('#fToolUseEnabled')?.checked !== false,
          allowedToolNames,
          toolProbeBudget: parseInt(overlay.querySelector('#fToolProbeBudget')?.value||'2'),
          toolProbeTemplates,
          minimumQualityScore: parseInt(overlay.querySelector('#fMinimumQualityScore')?.value||'70'),
          enforceQualityGate: overlay.querySelector('#fEnforceQualityGate')?.checked !== false,
          contextEnabled: overlay.querySelector('#fContextEnabled')?.checked !== false,
          contextQuery: (overlay.querySelector('#fContextQuery')?.value||'').trim(),
          contextFiles,
        };
        if (selectedTemplate.current) body.template = selectedTemplate.current;
        const r = await fetch('/api/v1/meetings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        if (!r.ok) { notify('Failed'); return; }
        notify('Meeting created'); close(); this._load();
      } catch { notify('Error'); }
    });

    const onKey = e => { if (e.key === 'Escape') { close(); document.removeEventListener('keydown', onKey); } };
    document.addEventListener('keydown', onKey);
  }

  _showMemory(name) { notify('Saved in memory: ' + name); }
}

const app = new MeetingApp();
window.app = app;
app._load();
</script>
</body>
</html>
