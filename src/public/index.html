<!DOCTYPE html>
<html lang="en" data-theme="dark" data-accent="white">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnoClaw</title>
  <link rel="stylesheet" href="css/bundle.css">
  <link rel="icon" href="icons/chat.svg" type="image/svg+xml">
  <style>
    /* Dialog overlay base */
    .dialog-overlay {
      animation: fadeIn 0.15s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    /* Session tree node styles */
    .session-node-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.1s;
    }
    .session-node-row:hover {
      background: rgba(255,255,255,0.05);
    }
    .session-node-row.active {
      background: rgba(124,58,237,0.15);
    }
    .session-icon.working {
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .session-node-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .session-node-time {
      font-size: 11px;
      color: var(--color-text-secondary);
    }
    .session-node-actions {
      display: flex;
      gap: 2px;
    }
    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-btn:hover {
      background: rgba(255,255,255,0.1);
    }
    /* Sidebar header */
    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 4px;
      margin-bottom: 8px;
    }
    .sidebar-header h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 0;
    }
    .sidebar-header button {
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--color-text-primary);
      width: 24px;
      height: 24px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sidebar-header button:hover {
      background: rgba(255,255,255,0.1);
    }
    /* Mode selector */
    .mode-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: var(--color-text-primary);
      cursor: pointer;
      padding: 6px 12px;
      font-size: 13px;
      font-family: var(--font-sans);
      white-space: nowrap;
      transition: background 0.15s;
    }
    .mode-btn:hover {
      background: rgba(255,255,255,0.1);
    }
    .mode-item:hover {
      background: rgba(255,255,255,0.05);
    }
    /* Messages */
    .message {
      padding: 4px 0;
    }
    .message-user {
      display: flex;
      justify-content: flex-end;
    }
    .message-assistant {
      display: flex;
      justify-content: flex-start;
    }
    .message-bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      position: relative;
    }
    .bubble-user {
      background: var(--color-bubble-sent);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .bubble-assistant {
      background: var(--color-bubble-received);
      color: var(--color-text-primary);
      border-bottom-left-radius: 4px;
    }
    .message-content {
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message-copy-btn {
      position: absolute;
      bottom: 4px;
      right: 4px;
      background: none;
      border: none;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.1s;
      padding: 2px;
    }
    .message-bubble:hover .message-copy-btn {
      opacity: 0.6;
    }
    .message-copy-btn:hover {
      opacity: 1 !important;
    }
    .message-system {
      text-align: center;
      padding: 8px;
      color: var(--color-text-secondary);
      font-size: 12px;
    }
    .message-error {
      color: var(--color-tool-error-text);
    }
    /* Think card */
    .think-card {
      margin: 4px 0;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      background: rgba(255,255,255,0.02);
    }
    .think-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 12px;
      color: var(--color-text-secondary);
      font-style: italic;
    }
    .think-content {
      padding: 8px 12px 12px;
      font-size: 13px;
      color: var(--color-text-secondary);
      white-space: pre-wrap;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    /* Tool cards */
    .tool-call-card {
      margin: 4px 0;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
    }
    .tool-call-card.tool-success {
      background: var(--color-tool-success-bg);
      border-color: rgba(52,211,153,0.2);
    }
    .tool-call-card.tool-error {
      background: var(--color-tool-error-bg);
      border-color: rgba(248,113,113,0.2);
    }
    .tool-call-header {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .spinner {
      animation: spin 1s linear infinite;
    }
    .tool-result-card {
      margin: 2px 0 4px;
      padding: 6px 12px;
      font-size: 12px;
      color: var(--color-text-secondary);
      border-left: 2px solid rgba(255,255,255,0.1);
    }
    /* Enhanced tool delegate styles */
    .delegate-tool-call {
      margin: 4px 0;
    }
    .delegate-tool-result {
      margin: 2px 0 4px;
    }
    /* Tool collapsed state — gradient fade for results */
    .tool-collapsed {
      max-height: 120px;
      overflow: hidden;
    }
    /* Result output flavors */
    .result-stdout {
      color: var(--color-text-secondary);
    }
    .result-stderr {
      color: var(--color-tool-error-text);
    }
    /* Expand button */
    .expand-btn {
      display: block;
      width: 100%;
      padding: 4px;
      background: none;
      border: none;
      border-top: 1px solid rgba(255,255,255,0.05);
      color: var(--color-text-secondary);
      cursor: pointer;
      font-size: 11px;
      font-family: var(--font-sans);
      transition: color 0.15s;
    }
    .expand-btn:hover {
      color: var(--color-text-primary);
    }
    /* Tool result fade overlay */
    .result-fade {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: linear-gradient(to bottom, transparent, rgba(15,15,19,0.95));
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    /* Todo list */
    .todo-list {
      margin: 4px 0;
      padding: 8px 12px;
      background: rgba(255,255,255,0.02);
      border-radius: 8px;
    }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 2px 0;
      font-size: 13px;
    }
    .todo-item.todo-completed {
      opacity: 0.5;
      text-decoration: line-through;
    }
    .todo-item.todo-in_progress {
      color: var(--color-accent);
    }
    .todo-status-icon {
      font-size: 12px;
    }
    /* Plan indicator */
    .plan-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      margin: 4px 0;
      background: rgba(124,58,237,0.1);
      border-radius: 8px;
      font-size: 13px;
      color: var(--color-accent);
    }
    .plan-exit {
      opacity: 0.6;
    }
    /* Conversation header */
    .conversation-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 8px;
    }
    .conversation-title {
      font-size: 15px;
      font-weight: 600;
    }
    .conversation-actions {
      display: flex;
      gap: 4px;
    }
    /* Composer */
    .composer-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .composer-row textarea {
      flex: 1;
      background: var(--color-bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      color: var(--color-text-primary);
      padding: 8px 12px;
      resize: none;
      font-family: var(--font-sans);
      font-size: 14px;
      min-height: 36px;
      max-height: 120px;
      outline: none;
    }
    .composer-row textarea:focus {
      border-color: var(--color-accent);
    }
    .mode-selector {
      background: var(--color-bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: var(--color-text-primary);
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      min-width: 60px;
    }
    .mode-selector:hover {
      background: rgba(255,255,255,0.05);
    }
    .attach-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      opacity: 0.6;
    }
    .attach-btn:hover {
      opacity: 1;
    }
    .send-btn {
      background: var(--color-accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 8px 20px;
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
      white-space: nowrap;
    }
    .send-btn:hover {
      opacity: 0.9;
    }
    .send-btn.sending {
      background: var(--color-tool-error-icon);
    }
    /* Attachments */
    .composer-attachments {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 6px;
    }
    .attachment-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
    }
    .attachment-remove {
      background: none;
      border: none;
      color: var(--color-text-secondary);
      cursor: pointer;
      font-size: 14px;
      padding: 0 2px;
    }
    /* Mode menu */
    .mode-menu-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 13px;
      border-radius: 4px;
    }
    .mode-menu-item:hover {
      background: rgba(255,255,255,0.05);
    }
    .mode-radio {
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      display: inline-block;
    }
    .mode-radio.active {
      border-color: var(--color-accent);
      background: var(--color-accent);
    }
    .mode-menu-divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 4px 0;
    }
    .mode-effort {
      justify-content: space-between;
    }
    /* Edit panel */
    .edit-panel {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
    }
    .edit-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .edit-panel-header h3 {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }
    .header-actions {
      display: flex;
      gap: 4px;
    }
    /* Forms */
    .form-section {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .form-section legend {
      font-size: 12px;
      color: var(--color-text-secondary);
      padding: 0 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-section label {
      display: block;
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-bottom: 4px;
      margin-top: 8px;
    }
    .form-section label:first-of-type {
      margin-top: 0;
    }
    .form-section input,
    .form-section select,
    .form-section textarea {
      width: 100%;
      padding: 6px 10px;
      background: var(--color-bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: var(--color-text-primary);
      font-size: 13px;
      font-family: var(--font-sans);
    }
    .form-section textarea {
      resize: vertical;
      font-family: var(--font-mono);
      font-size: 12px;
    }
    .form-section select {
      cursor: pointer;
    }
    .form-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    /* List items */
    .list-item {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .list-item:hover {
      background: rgba(255,255,255,0.05);
    }
    .list-item-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 2px;
    }
    .list-item-name {
      font-size: 13px;
      font-weight: 500;
    }
    .list-item-desc {
      font-size: 12px;
      color: var(--color-text-secondary);
    }
    .list-item-meta {
      font-size: 11px;
      color: var(--color-text-secondary);
      margin-left: auto;
    }
    .list-item-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.08);
      color: var(--color-text-secondary);
      margin-left: auto;
    }
    .list-item-badge.enabled {
      color: var(--color-tool-success-icon);
    }
    .list-item-badge.disabled {
      color: var(--color-text-secondary);
    }
    .list-item-tags {
      display: flex;
      gap: 4px;
      margin-top: 4px;
    }
    .tag {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.06);
      color: var(--color-text-secondary);
    }
    /* Agent tree */
    .agent-node-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.1s;
    }
    .agent-node-row:hover {
      background: rgba(255,255,255,0.05);
    }
    .agent-node-row.active {
      background: rgba(124,58,237,0.15);
    }
    .agent-role-badge {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--color-accent);
      color: white;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      flex-shrink: 0;
    }
    .agent-node-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    /* Settings page */
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
    }
    .setting-row label {
      font-size: 13px;
      margin: 0;
    }
    /* Context menu */
    .context-menu-item {
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      border-radius: 4px;
    }
    .context-menu-item:hover {
      background: rgba(255,255,255,0.08);
    }
    .context-menu-divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 2px 0;
    }
    /* Filter bar */
    .filter-bar {
      padding: 4px 0 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .filter-input {
      width: 100%;
      padding: 6px 8px;
      background: var(--color-bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      color: var(--color-text-primary);
      font-size: 12px;
    }
    .filter-select {
      width: 100%;
      padding: 6px 8px;
      background: var(--color-bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      color: var(--color-text-primary);
      font-size: 12px;
    }
    /* Context indicator */
    .context-indicator {
      display: flex;
      align-items: center;
      cursor: pointer;
      opacity: 0.6;
    }
    .context-indicator:hover {
      opacity: 1;
    }
    /* Skill preview */
    .skill-meta {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .skill-description {
      margin-bottom: 16px;
    }
    .skill-description h4,
    .skill-content h4 {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-bottom: 4px;
    }
    .skill-content pre,
    .skill-markdown {
      background: var(--color-bg);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 12px;
      font-size: 12px;
      font-family: var(--font-mono);
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--color-text-primary);
      max-height: 400px;
      overflow-y: auto;
    }
    /* Page container for non-sessions pages (list+detail layout).
       Display is controlled by PageRegistry via element.style.display. */

    /* ── Syntax highlighting theme variables ── */
    :root,
    [data-theme="dark"] {
      --hl-comment: #6A9955;
      --hl-string: #CE9178;
      --hl-number: #B5CEA8;
      --hl-keyword: #569CD6;
      --hl-function: #DCDCAA;
    }
    [data-theme="light"] {
      --hl-comment: #008000;
      --hl-string: #A31515;
      --hl-number: #098658;
      --hl-keyword: #0000FF;
      --hl-function: #795E26;
    }

  </style>
</head>
<body>
  <div id="app-root">
    <header id="titlebar"></header>

    <main id="page-container" class="page-container">
      <div id="page-area"></div>
      <div id="layout-split-handle" class="layout-split-handle"></div>
      <div id="sessions-panel"></div>
    </main>
  </div>

  <script src="monaco/vs/loader.js"></script>
  <script src="d3-force.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
