<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plugin Lab</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; overflow: hidden; }
  body { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--rc-text, #f4f4f6); }
  .plugin-lab {
    height: 100vh;
    display: grid;
    grid-template-rows: auto auto 1fr;
    gap: 12px;
    padding: 14px;
  }
  .command-bar {
    min-height: 48px;
    display: grid;
    grid-template-columns: minmax(180px, 1fr) auto auto;
    gap: 8px;
    align-items: center;
    padding: 7px;
    border: 1px solid var(--rc-line, rgba(255,255,255,.08));
    border-radius: 12px;
    background: rgba(5,6,9,.72);
    backdrop-filter: blur(24px) saturate(1.3);
  }
  .title {
    padding: 0 8px;
    min-width: 0;
  }
  .title strong {
    display: block;
    font-size: 15px;
    font-weight: 650;
  }
  .title span {
    display: block;
    margin-top: 2px;
    color: var(--rc-muted, rgba(255,255,255,.52));
    font-size: 11px;
  }
  .btn {
    height: 34px;
    padding: 0 12px;
    border: 1px solid var(--rc-line, rgba(255,255,255,.08));
    border-radius: 8px;
    background: rgba(255,255,255,.045);
    color: inherit;
    font: inherit;
    font-size: 12px;
    font-weight: 650;
    cursor: pointer;
  }
  .btn.primary {
    color: var(--rc-red, #ff4058);
    background: rgba(255,64,88,.16);
    border-color: rgba(255,64,88,.28);
  }
  .status {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 0 10px;
    height: 30px;
    border: 1px solid var(--rc-line, rgba(255,255,255,.08));
    border-radius: 999px;
    color: var(--rc-muted, rgba(255,255,255,.52));
    font-size: 11px;
  }
  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--rc-faint, rgba(255,255,255,.34));
  }
  .dot.ok {
    background: var(--rc-green, #59d499);
    box-shadow: 0 0 10px rgba(89,212,153,.32);
  }
  .kpis {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
  }
  .kpi {
    min-height: 92px;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid var(--rc-line, rgba(255,255,255,.08));
  }
  .kpi label {
    display: block;
    margin-bottom: 12px;
    color: var(--rc-muted, rgba(255,255,255,.52));
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .kpi strong {
    display: block;
    font-size: 25px;
    line-height: 1;
  }
  .kpi span {
    display: block;
    margin-top: 7px;
    color: var(--rc-faint, rgba(255,255,255,.34));
    font-size: 11px;
  }
  .content {
    min-height: 0;
    display: grid;
    grid-template-columns: minmax(280px, 420px) minmax(0, 1fr);
    gap: 10px;
  }
  .panel {
    min-height: 0;
    overflow: hidden;
    border: 1px solid var(--rc-line, rgba(255,255,255,.08));
    border-radius: 12px;
    background: rgba(5,6,9,.64);
  }
  .panel-head {
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    border-bottom: 1px solid var(--rc-line, rgba(255,255,255,.08));
  }
  .panel-head strong {
    font-size: 12px;
  }
  .panel-head span {
    color: var(--rc-muted, rgba(255,255,255,.52));
    font-size: 10px;
  }
  .list {
    height: calc(100% - 42px);
    overflow: auto;
    padding: 6px;
  }
  .row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 12px;
    align-items: center;
    padding: 10px;
    border-radius: 8px;
  }
  .row:hover {
    background: rgba(255,255,255,.045);
  }
  .row strong {
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 12px;
  }
  .row span {
    display: block;
    margin-top: 3px;
    color: var(--rc-muted, rgba(255,255,255,.52));
    font-size: 10px;
  }
  .pill {
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid var(--rc-line, rgba(255,255,255,.08));
    color: var(--rc-muted, rgba(255,255,255,.52));
    font-size: 10px;
  }
  .pill.ok {
    color: var(--rc-green, #59d499);
    background: rgba(89,212,153,.14);
    border-color: rgba(89,212,153,.24);
  }
  pre {
    height: calc(100% - 42px);
    margin: 0;
    padding: 12px;
    overflow: auto;
    color: var(--rc-body, rgba(255,255,255,.76));
    font-family: "JetBrains Mono", "Cascadia Code", Consolas, monospace;
    font-size: 11px;
    line-height: 1.55;
    white-space: pre-wrap;
  }
  @media (max-width: 900px) {
    .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .content { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<main class="plugin-lab">
  <section class="command-bar">
    <div class="title">
      <strong>Plugin Lab</strong>
      <span>Bridge, plugin host, agents, tools, and route diagnostics</span>
    </div>
    <div id="bridgeStatus" class="status"><span class="dot"></span><span>Bridge pending</span></div>
    <button id="refreshBtn" class="btn primary">Refresh</button>
  </section>

  <section class="kpis" id="kpis"></section>

  <section class="content">
    <article class="panel">
      <div class="panel-head"><strong>Plugins</strong><span id="pluginMeta">-</span></div>
      <div id="pluginList" class="list"></div>
    </article>
    <article class="panel">
      <div class="panel-head"><strong>Diagnostics</strong><span id="diagMeta">Waiting</span></div>
      <pre id="output"></pre>
    </article>
  </section>
</main>

<script>
const kpis = document.getElementById('kpis');
const pluginList = document.getElementById('pluginList');
const output = document.getElementById('output');
const bridgeStatus = document.getElementById('bridgeStatus');
const pluginMeta = document.getElementById('pluginMeta');
const diagMeta = document.getElementById('diagMeta');

window.addEventListener('anoclaw-ready', () => {
  setBridge(true);
  mountSlotBadge();
});
window.addEventListener('message', event => {
  if (!event.data || event.data.type !== 'anoclaw:theme') return;
  document.documentElement.setAttribute('data-theme', event.data.theme || 'dark');
});

document.getElementById('refreshBtn').addEventListener('click', load);

function setBridge(ok) {
  bridgeStatus.innerHTML = `<span class="dot ${ok ? 'ok' : ''}"></span><span>${ok ? 'Bridge ready' : 'Bridge pending'}</span>`;
}

async function load() {
  diagMeta.textContent = 'Refreshing';
  try {
    const resp = await fetch('/api/v1/plugins/test-plugin/diagnostics');
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.message || data.error || resp.statusText);
    render(data);
    output.textContent = JSON.stringify(data, null, 2);
    diagMeta.textContent = new Date().toLocaleTimeString();
  } catch (err) {
    output.textContent = err.stack || err.message || String(err);
    diagMeta.textContent = 'Error';
  }
}

function render(data) {
  const plugins = data.plugins || { total: 0, active: 0, error: 0, items: [] };
  const agents = data.agents || { total: 0, active: 0 };
  const tools = data.tools || { total: 0, groups: [] };
  kpis.innerHTML = [
    stat('Plugins', plugins.total, `${plugins.active} active / ${plugins.error} error`),
    stat('Agents', agents.total, `${agents.active} active`),
    stat('Tools', tools.total, `${(tools.groups || []).length} groups`),
    stat('Boots', data.bootCount || 0, data.lastBootAt ? shortDate(data.lastBootAt) : 'first run'),
  ].join('');
  pluginMeta.textContent = `${plugins.total} installed`;
  pluginList.innerHTML = (plugins.items || []).map(p => `
    <div class="row">
      <div><strong>${esc(p.displayName || p.name)}</strong><span>${esc(p.name)} ${esc(p.version || '')}</span></div>
      <div class="pill ${String(p.status).toLowerCase() === 'active' ? 'ok' : ''}">${esc(p.status || 'unknown')}</div>
    </div>
  `).join('') || '<div class="row"><span>No plugin data</span></div>';
}

function stat(label, value, sub) {
  return `<article class="kpi"><label>${esc(label)}</label><strong>${esc(value)}</strong><span>${esc(sub)}</span></article>`;
}

function shortDate(value) {
  try { return new Date(value).toLocaleString(); } catch { return String(value || '-'); }
}

function esc(value) {
  const el = document.createElement('span');
  el.textContent = String(value == null ? '' : value);
  return el.innerHTML;
}

setBridge(Boolean(window.anoclaw));
load();
mountSlotBadge();

function mountSlotBadge() {
  if (!window.anoclaw?.ui?.mount || document.documentElement.dataset.labSlotMounted === '1') return;
  document.documentElement.dataset.labSlotMounted = '1';
  const badge = document.createElement('span');
  badge.className = 'anoclaw-slot-pill';
  badge.dataset.tone = 'info';
  badge.innerHTML = '<span class="slot-dot"></span><strong>Lab</strong><span>slot test</span>';
  window.anoclaw.ui.mount('titlebar-right', badge, {
    id: 'plugin-lab-slot-test',
    pluginName: window.__ANOCLAW_PLUGIN_NAME__ || 'test-plugin',
    position: 'prepend',
    priority: 90,
  });
}
</script>
</body>
</html>
