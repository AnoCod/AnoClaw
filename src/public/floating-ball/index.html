<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=400,height=400">
<title>AnoClaw</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Satellites fixed to full window, appear on hover -->
  <div id="satellites" class="satellites"></div>
  <section id="helperPanel" class="helper-panel" aria-label="AnoClaw quick helper">
    <div class="helper-head">
      <div>
        <div class="helper-kicker">AnoClaw Helper</div>
        <div id="helperTitle" class="helper-title">Ready</div>
      </div>
      <button id="panelClose" class="panel-icon-btn" aria-label="Close helper">×</button>
    </div>
    <div class="status-row">
      <span id="statusPill" class="status-pill">Idle</span>
      <span id="statusDetail" class="status-detail">No active task</span>
    </div>
    <div id="goalCard" class="goal-card" aria-live="polite">
      <span id="goalBadge" class="goal-badge">Goal</span>
      <div class="goal-copy">
        <div id="goalTitle" class="goal-title">No goal</div>
        <div id="goalDetail" class="goal-detail">Ready</div>
      </div>
      <div class="goal-actions">
        <button id="goalToggle" type="button">Pause</button>
        <button id="goalOpen" type="button">Open</button>
      </div>
    </div>
    <div class="target-row">
      <label class="target-label" for="quickTarget">To</label>
      <select id="quickTarget" class="target-select" aria-label="Quick ask target"></select>
    </div>
    <div class="quick-row">
      <input id="quickInput" class="quick-input" type="text" placeholder="Ask quickly..." autocomplete="off">
      <button id="quickSend" class="quick-send">Send</button>
    </div>
    <div class="action-grid">
      <button data-helper-action="continue-current">Continue</button>
      <button data-helper-action="open-current">Open</button>
      <button data-helper-action="stop-current">Stop</button>
    </div>
    <div id="waitingCard" class="waiting-card">
      <button id="waitingOpen" class="waiting-open" type="button">
        <span class="waiting-badge">Waiting</span>
        <span id="waitingTitle" class="waiting-title">Needs attention</span>
        <span id="waitingDetail" class="waiting-detail">Open AnoClaw to review.</span>
      </button>
      <div id="waitingActions" class="waiting-actions" aria-label="Waiting item actions">
        <button id="waitingReject" type="button">Reject</button>
        <button id="waitingApprove" type="button">Approve</button>
      </div>
    </div>
    <div class="clip-card">
      <div class="clip-head">
        <span>Clipboard text</span>
        <button id="clipRefresh" class="text-btn">Refresh</button>
      </div>
      <div id="clipPreview" class="clip-preview">Copy selected text to unlock actions.</div>
      <div class="clip-actions">
        <button data-text-action="translate">Translate</button>
        <button data-text-action="polish">Polish</button>
        <button data-text-action="summarize">Summarize</button>
        <button data-text-action="ask">Ask Agent</button>
      </div>
    </div>
    <div id="recentList" class="recent-list"></div>
  </section>

  <!-- The companion, centered. Outer area drags the window; the pet opens actions. -->
  <div class="ball-wrap">
    <div class="ball-drag-ring" title="拖动小爪"></div>
    <button class="ball" id="ballButton" aria-label="展开小爪动作" title="展开动作">
      <img class="pet-image" src="assets/anoclaw-pet.png" alt="" draggable="false">
      <span id="ballStatus" class="ball-status" aria-hidden="true"></span>
    </button>
  </div>

  <script src="app.js"></script>
</body>
</html>
