<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting</title>
<style>
:root {
  --c-canvas: #07080a;
  --c-surface: #0d0d0d;
  --c-surface-elevated: #101111;
  --c-surface-card: #121212;
  --c-hairline: #242728;
  --c-hairline-soft: rgba(255,255,255,0.08);
  --c-hairline-strong: rgba(255,255,255,0.16);
  --c-text-primary: #f4f4f6;
  --c-text-secondary: rgba(255,255,255,0.72);
  --c-text-tertiary: #9c9c9d;
  --c-text-quaternary: #6a6b6c;
  --c-accent: #ffffff;
  --c-accent-soft: var(--c-surface-elevated);
  --c-accent-glow: rgba(255,255,255,0.10);
  --c-primary: #ffffff;
  --c-on-primary: #000000;
  --c-primary-pressed: #e8e8e8;
  --c-green: #59d499;
  --c-green-soft: rgba(89,212,153,0.12);
  --c-blue: #57c1ff;
  --c-blue-soft: rgba(87,193,255,0.12);
  --c-yellow: #ffc533;
  --c-yellow-soft: rgba(255,197,51,0.12);
  --c-red: #ff6161;
  --c-red-soft: rgba(255,97,97,0.12);
  --r-sm: 6px; --r-md: 8px; --r-lg: 10px; --r-xl: 16px; --r-full: 9999px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-mono: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
}
[data-theme="light"] {
  --c-canvas: #f5f5f0; --c-surface: #ffffff; --c-surface-elevated: #fafafa;
  --c-surface-card: #f0f0f0; --c-hairline: #e0e0e0; --c-hairline-soft: rgba(0,0,0,0.06);
  --c-hairline-strong: rgba(0,0,0,0.14); --c-text-primary: rgba(0,0,0,0.88);
  --c-text-secondary: rgba(0,0,0,0.60); --c-text-tertiary: rgba(0,0,0,0.38);
  --c-text-quaternary: rgba(0,0,0,0.18); --c-accent: #111111;
  --c-accent-soft: rgba(0,0,0,0.06); --c-primary: #111111;
  --c-on-primary: #ffffff; --c-primary-pressed: #333333; --c-green: #1a8a4a;
  --c-green-soft: rgba(26,138,74,0.08); --c-blue: #1a6eb5;
  --c-blue-soft: rgba(26,110,181,0.08);
}
html, body { margin:0; padding:0; height:100%; background:var(--c-canvas); color:var(--c-text-primary); font-family:var(--font); overflow-y:auto; -webkit-font-smoothing:antialiased; }
.page-inner { padding:24px; min-width:0; }

/* ── Header ── */
.page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid var(--c-hairline); gap:12px; flex-wrap:wrap; }
.page-title { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--c-text-secondary); font-weight:500; }
.page-actions { display:flex; gap:8px; align-items:center; }

/* ── Search ── */
.search-row { display:flex; gap:8px; margin-bottom:16px; align-items:center; }
.search-input { background:var(--c-surface-elevated); border:1px solid var(--c-hairline); border-radius:var(--r-sm); padding:7px 12px; color:var(--c-text-primary); font-size:12px; font-family:var(--font); outline:none; transition:border-color 0.15s; flex:1; }
.search-input:focus { border-color:var(--c-hairline-strong); }
.search-input::placeholder { color:var(--c-text-quaternary); }
.search-count { font-size:9px; color:var(--c-text-quaternary); white-space:nowrap; letter-spacing:.5px; }

/* ── Section ── */
.section { border:1px solid var(--c-hairline); border-radius:var(--r-md); padding:16px; margin-bottom:12px; background:var(--c-surface); transition:border-color 0.15s; }
.section:hover { border-color:var(--c-hairline-strong); }
.section-legend { font-size:9px; color:var(--c-text-quaternary); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:12px; font-weight:500; }

/* ── Buttons ── */
.btn { background:transparent; border:1px solid var(--c-hairline); color:var(--c-text-tertiary); padding:7px 18px; font-size:10px; font-weight:500; letter-spacing:1.2px; cursor:pointer; text-transform:uppercase; font-family:var(--font); border-radius:var(--r-sm); transition:all 0.15s; white-space:nowrap; display:inline-flex; align-items:center; gap:5px; }
.btn:hover { border-color:var(--c-hairline-strong); color:var(--c-text-primary); }
.btn-primary { border-color:var(--c-primary); background:var(--c-primary); color:var(--c-on-primary); }
.btn-primary:hover { background:var(--c-primary-pressed); border-color:var(--c-primary-pressed); color:var(--c-on-primary); }
.btn-danger { border-color:rgba(255,97,97,0.3); color:rgba(255,97,97,0.6); }
.btn-danger:hover { border-color:var(--c-red); color:var(--c-red); background:var(--c-red-soft); }
.btn-success { border-color:rgba(89,212,153,0.3); color:var(--c-green); }
.btn-success:hover { border-color:var(--c-green); background:var(--c-green-soft); }
.btn:disabled { opacity:0.25; cursor:default; pointer-events:none; }
.btn-sm { padding:5px 12px; font-size:9px; }
.btn-icon { padding:6px; min-width:0; }

/* ── Inputs ── */
.input { background:var(--c-surface-elevated); border:1px solid var(--c-hairline); border-radius:var(--r-sm); padding:7px 10px; color:var(--c-text-primary); font-size:12px; font-family:var(--font); outline:none; transition:border-color 0.15s; width:100%; }
.input:focus { border-color:var(--c-hairline-strong); }
.input::placeholder { color:var(--c-text-quaternary); }
.select { background:var(--c-surface-elevated); border:1px solid var(--c-hairline); border-radius:var(--r-sm); padding:6px 8px; color:var(--c-text-primary); font-size:11px; font-family:var(--font); outline:none; cursor:pointer; width:100%; transition:border-color 0.15s; }
.select:focus { border-color:var(--c-hairline-strong); }
.select option { background:#111; color:#fff; }
.textarea { background:var(--c-surface-elevated); border:1px solid var(--c-hairline); border-radius:var(--r-sm); padding:7px 10px; color:var(--c-text-primary); font-size:12px; font-family:var(--font); outline:none; transition:border-color 0.15s; width:100%; resize:vertical; min-height:40px; }
.textarea:focus { border-color:var(--c-hairline-strong); }
.label { font-size:10px; color:var(--c-text-tertiary); letter-spacing:1px; text-transform:uppercase; display:block; margin-bottom:4px; }

/* ── Status dots ── */
.pulse-dot { width:5px; height:5px; border-radius:50%; display:inline-block; margin-right:6px; vertical-align:middle; flex-shrink:0; }
.pulse-dot.running { background:var(--c-green); animation:pulse 2s ease-in-out infinite; }
.pulse-dot.idle { background:var(--c-text-quaternary); }
.pulse-dot.completed { background:var(--c-text-quaternary); }
.pulse-dot.cancelled { background:rgba(255,97,97,0.4); }
@keyframes pulse { 0%,100% { opacity:0.4 } 50% { opacity:1 } }

/* ── Modal ── */
.modal-overlay { position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.65); display:flex; align-items:flex-start; justify-content:center; padding-top:60px; }
.modal-card { width:520px; max-width:90vw; max-height:80vh; overflow-y:auto; background:var(--c-surface); border:1px solid var(--c-hairline); border-radius:var(--r-lg); padding:24px; position:relative; }
.modal-card::-webkit-scrollbar { width:4px; }
.modal-card::-webkit-scrollbar-track { background:transparent; }
.modal-card::-webkit-scrollbar-thumb { background:var(--c-hairline); border-radius:2px; }
.modal-close { position:absolute; top:12px; right:12px; background:none; border:1px solid var(--c-hairline); color:var(--c-text-tertiary); cursor:pointer; font-size:14px; padding:4px 8px; border-radius:var(--r-sm); transition:all 0.15s; }
.modal-close:hover { border-color:var(--c-hairline-strong); color:var(--c-text-primary); }

/* ── Meeting cards ── */
.meeting-card { display:block; padding:12px 14px; border:1px solid var(--c-hairline); border-radius:var(--r-md); margin-bottom:5px; cursor:pointer; transition:all 0.15s; background:transparent; width:100%; text-align:left; color:inherit; font-family:inherit; }
.meeting-card:hover { background:var(--c-surface-elevated); border-color:var(--c-hairline-strong); transform:translateY(-1px); }
.meeting-card.active { border-color:var(--c-hairline-strong); background:var(--c-surface-elevated); }
.meeting-card-top { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.meeting-card-title { font-size:12px; font-weight:500; color:var(--c-text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
.meeting-card-badge { font-size:8px; letter-spacing:0.8px; text-transform:uppercase; padding:2px 7px; border-radius:var(--r-sm); font-weight:500; white-space:nowrap; }
.meeting-card-badge.running { background:var(--c-green-soft); color:var(--c-green); }
.meeting-card-badge.completed { background:rgba(255,255,255,0.04); color:var(--c-text-quaternary); }
.meeting-card-badge.idle { background:rgba(255,255,255,0.03); color:var(--c-text-quaternary); }
.meeting-card-avatars { display:flex; margin-top:6px; }
.meeting-card-avatars .avatar-sm { margin-left:-4px; }
.meeting-card-avatars .avatar-sm:first-child { margin-left:0; }
.meeting-card-meta { font-size:10px; color:var(--c-text-tertiary); display:flex; gap:8px; align-items:center; flex-wrap:wrap; }

/* ── Avatar ── */
.avatar { width:32px; height:32px; border-radius:var(--r-full); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; color:#fff; flex-shrink:0; border:2px solid var(--c-canvas); }
.avatar-sm { width:22px; height:22px; border-radius:var(--r-full); display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:600; color:#fff; flex-shrink:0; border:1.5px solid var(--c-canvas); }
.avatar-stack { display:flex; }
.avatar-stack .avatar-sm { margin-left:-6px; }
.avatar-stack .avatar-sm:first-child { margin-left:0; }
.avatar-count { width:22px; height:22px; border-radius:var(--r-full); display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:500; color:var(--c-text-tertiary); background:var(--c-surface-elevated); border:1.5px solid var(--c-canvas); margin-left:-6px; }

/* ── Layout ── */
.meeting-layout { display:flex; gap:20px; align-items:flex-start; }
.meeting-list { flex:0 0 300px; min-width:0; }
.meeting-detail { flex:1; min-width:0; overflow:auto; }

/* ── Detail ── */
.detail-header { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:12px; }
.detail-topic { font-size:16px; font-weight:500; color:var(--c-text-primary); margin-bottom:4px; line-height:1.3; }
.detail-goal { font-size:11px; color:var(--c-text-secondary); margin-bottom:8px; line-height:1.5; }
.detail-meta { font-size:10px; color:var(--c-text-tertiary); display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; align-items:center; }
.detail-meta-tag { padding:2px 6px; background:var(--c-surface-elevated); border-radius:var(--r-sm); font-size:9px; }
.detail-actions { display:flex; gap:6px; flex-shrink:0; flex-wrap:wrap; }

/* ── Participant chips ── */
.participant-chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
.participant-chip { display:flex; align-items:center; gap:6px; font-size:10px; padding:4px 10px; border:1px solid var(--c-hairline); border-radius:var(--r-full); color:var(--c-text-secondary); transition:border-color 0.15s; }
.participant-chip:hover { border-color:var(--c-hairline-strong); }

/* ── Timeline ── */
.timeline { position:relative; padding-left:20px; margin-bottom:16px; }
.timeline::before { content:''; position:absolute; left:7px; top:8px; bottom:8px; width:1px; background:var(--c-hairline); }
.timeline-item { position:relative; padding:8px 0; }
.timeline-dot { position:absolute; left:-20px; top:12px; width:15px; height:15px; border-radius:var(--r-full); background:var(--c-surface-card); border:2px solid var(--c-hairline); display:flex; align-items:center; justify-content:center; }
.timeline-dot.active { border-color:var(--c-green); background:var(--c-green-soft); }
.timeline-dot.completed { border-color:var(--c-text-quaternary); }
.timeline-label { font-size:9px; color:var(--c-text-quaternary); letter-spacing:1px; text-transform:uppercase; margin-bottom:2px; }
.timeline-content { font-size:11px; color:var(--c-text-tertiary); }

/* ── Transcript ── */
.transcript-entry { padding:10px 0; border-bottom:1px solid var(--c-hairline); }
.transcript-entry:last-child { border-bottom:none; }
.transcript-header { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.transcript-speaker { font-size:10px; font-weight:600; letter-spacing:0.5px; display:flex; align-items:center; gap:6px; }
.transcript-round { font-size:8px; color:var(--c-text-quaternary); letter-spacing:0.5px; font-weight:400; padding:1px 5px; background:var(--c-surface-elevated); border-radius:3px; }
.transcript-content { font-size:12px; line-height:1.65; color:var(--c-text-secondary); }
.transcript-error { color:var(--c-red); font-style:italic; }
.round-header { font-size:8px; color:var(--c-text-quaternary); letter-spacing:1px; text-transform:uppercase; padding:14px 0 6px; border-bottom:1px solid var(--c-hairline); margin-bottom:2px; display:flex; align-items:center; gap:6px; }
.round-header::before { content:''; display:inline-block; width:3px; height:3px; border-radius:50%; background:var(--c-text-quaternary); }

/* ── Running indicator ── */
.running-indicator { display:flex; align-items:center; gap:8px; padding:8px 12px; background:var(--c-green-soft); border:1px solid rgba(89,212,153,0.2); border-radius:var(--r-sm); margin-bottom:12px; }
.running-indicator-text { font-size:10px; color:var(--c-green); letter-spacing:0.5px; font-weight:500; }
.running-spinner { width:12px; height:12px; border:1.5px solid rgba(89,212,153,0.2); border-top-color:var(--c-green); border-radius:50%; animation:spin 0.8s linear infinite; flex-shrink:0; }
@keyframes spin { to { transform:rotate(360deg) } }

/* ── Action items ── */
.action-item { display:flex; align-items:flex-start; gap:10px; padding:10px 0; border-bottom:1px solid var(--c-hairline); transition:background 0.1s; }
.action-item:last-child { border-bottom:none; }
.action-item:hover { background:var(--c-surface-elevated); margin:0 -8px; padding:10px 8px; border-radius:var(--r-sm); }
.action-check { width:16px; height:16px; border:1.5px solid var(--c-hairline-strong); border-radius:4px; flex-shrink:0; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; margin-top:1px; }
.action-check:hover { border-color:var(--c-primary); }
.action-check.checked { background:var(--c-primary); border-color:var(--c-primary); }
.action-check.checked::after { content:'✓'; color:var(--c-on-primary); font-size:10px; font-weight:700; }
.action-task { flex:1; font-size:11px; line-height:1.55; color:var(--c-text-secondary); }
.action-task.completed { text-decoration:line-through; color:var(--c-text-quaternary); }
.action-badges { display:flex; gap:4px; align-items:center; flex-shrink:0; }
.action-assignee { font-size:9px; padding:2px 7px; border-radius:var(--r-full); background:var(--c-surface-elevated); color:var(--c-text-tertiary); white-space:nowrap; border:1px solid var(--c-hairline); }
.action-priority { font-size:8px; letter-spacing:0.5px; text-transform:uppercase; padding:2px 6px; border-radius:3px; font-weight:500; }
.action-priority.high { background:var(--c-red-soft); color:var(--c-red); }
.action-priority.medium { background:var(--c-yellow-soft); color:var(--c-yellow); }
.action-priority.low { background:var(--c-green-soft); color:var(--c-green); }

/* ── Summary ── */
.summary-text { font-size:12px; line-height:1.7; color:var(--c-text-secondary); white-space:pre-wrap; }
.evidence-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:8px; margin-bottom:10px; }
.evidence-stat { padding:8px 10px; border:1px solid var(--c-hairline); border-radius:var(--r-sm); background:var(--c-surface-elevated); }
.evidence-stat strong { display:block; font-size:15px; color:var(--c-text-primary); margin-bottom:2px; }
.evidence-stat span { font-size:8px; text-transform:uppercase; letter-spacing:1px; color:var(--c-text-quaternary); }
.evidence-terms { display:flex; flex-wrap:wrap; gap:5px; }
.evidence-term { font-size:9px; color:var(--c-blue); background:var(--c-blue-soft); border:1px solid rgba(87,193,255,0.2); border-radius:var(--r-full); padding:2px 7px; }
.plan-text { font-size:12px; line-height:1.65; color:var(--c-text-secondary); white-space:pre-wrap; max-height:420px; overflow:auto; padding-right:6px; }

/* ── Agent grid ── */
.agent-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:6px; margin-top:6px; }
.agent-option { padding:8px 10px; border:1px solid var(--c-hairline); border-radius:var(--r-sm); cursor:pointer; transition:all 0.15s; font-family:var(--font); background:transparent; color:var(--c-text-secondary); font-size:10px; text-align:left; display:flex; align-items:center; gap:8px; }
.agent-option:hover { background:var(--c-surface-elevated); border-color:var(--c-hairline-strong); }
.agent-option.selected { border-color:var(--c-hairline-strong); color:var(--c-text-primary); background:var(--c-surface-elevated); }
.agent-option .check { width:14px; height:14px; border-radius:4px; border:1.5px solid var(--c-hairline-strong); flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
.agent-option.selected .check { border-color:var(--c-primary); background:var(--c-primary); }
.agent-option.selected .check::after { content:'✓'; color:var(--c-on-primary); font-size:9px; font-weight:700; }
.agent-avatar { width:22px; height:22px; border-radius:var(--r-full); display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:600; color:#fff; flex-shrink:0; }

/* ── Form ── */
.form-row { margin-bottom:14px; }
.form-row-double { display:flex; gap:12px; }
.form-row-double>* { flex:1; }

/* ── Template grid ── */
.template-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:6px; }
.template-option { padding:12px 14px; border:1px solid var(--c-hairline); border-radius:var(--r-md); cursor:pointer; transition:all 0.15s; font-family:var(--font); background:transparent; color:var(--c-text-secondary); text-align:left; font-size:10px; display:flex; align-items:flex-start; gap:10px; }
.template-option:hover { background:var(--c-surface-elevated); border-color:var(--c-hairline-strong); }
.template-option.selected { border-color:var(--c-hairline-strong); color:var(--c-text-primary); background:var(--c-surface-elevated); }
.template-icon { width:28px; height:28px; border-radius:var(--r-sm); background:var(--c-surface-elevated); display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--c-text-tertiary); }
.template-option.selected .template-icon { background:var(--c-surface-card); color:var(--c-text-primary); }
.template-name { font-weight:500; font-size:11px; margin-bottom:2px; color:var(--c-text-primary); }
.template-desc { font-size:9px; color:var(--c-text-tertiary); line-height:1.4; }

/* ── Empty state ── */
.empty-state { text-align:center; padding:48px 0; }
.empty-state-icon { margin-bottom:12px; opacity:0.15; }
.empty-state-text { font-size:11px; color:var(--c-text-tertiary); letter-spacing:0.5px; }

/* ── Search results ── */
.search-result { padding:10px 12px; border:1px solid var(--c-hairline); border-radius:var(--r-sm); margin-bottom:4px; cursor:pointer; background:transparent; transition:all 0.15s; display:block; width:100%; text-align:left; color:inherit; font-family:inherit; font-size:11px; }
.search-result:hover { background:var(--c-surface-elevated); border-color:var(--c-hairline-strong); }
.search-result-title { font-weight:500; color:var(--c-text-primary); margin-bottom:2px; }
.search-result-desc { color:var(--c-text-tertiary); font-size:10px; }

/* ── Notify ── */
.notify { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); padding:8px 16px; border-radius:var(--r-sm); font-size:11px; background:var(--c-surface-card); border:1px solid var(--c-hairline); color:var(--c-text-secondary); opacity:0; transition:opacity 0.3s; z-index:100; pointer-events:none; }
.notify.show { opacity:1; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--c-hairline); border-radius:2px; }

/* ── Progress bar ── */
.progress-bar-wrap { height:6px; background:var(--c-surface-elevated); border-radius:3px; overflow:hidden; margin:8px 0; }
.progress-bar-fill { height:100%; background:#ffffff; border-radius:3px; transition:width 0.5s ease; }
.progress-label { font-size:9px; color:var(--c-text-quaternary); letter-spacing:0.5px; display:flex; justify-content:space-between; }

/* ── Duration ── */
.duration-bar { display:flex; align-items:center; gap:8px; padding:8px 12px; background:var(--c-surface-elevated); border:1px solid var(--c-hairline); border-radius:var(--r-sm); margin-bottom:10px; }
.duration-icon { color:var(--c-text-tertiary); flex-shrink:0; }
.duration-info { flex:1; }
.duration-elapsed { font-size:11px; font-weight:500; color:var(--c-text-primary); }
.duration-detail { font-size:9px; color:var(--c-text-tertiary); }

/* ── Analytics ── */
.analytics-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.analytics-card { padding:10px 12px; border:1px solid var(--c-hairline); border-radius:var(--r-sm); background:var(--c-surface-elevated); }
.analytics-card-label { font-size:8px; color:var(--c-text-quaternary); letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; }
.analytics-card-value { font-size:14px; font-weight:600; color:var(--c-text-primary); }
.analytics-card-sub { font-size:9px; color:var(--c-text-tertiary); }
.speaker-stat { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid var(--c-hairline); }
.speaker-stat:last-child { border-bottom:none; }
.speaker-bar-wrap { flex:1; height:4px; background:var(--c-surface-elevated); border-radius:2px; overflow:hidden; }
.speaker-bar-fill { height:100%; border-radius:2px; transition:width 0.4s ease; }
.speaker-stat-name { font-size:10px; color:var(--c-text-secondary); min-width:80px; }
.speaker-stat-val { font-size:9px; color:var(--c-text-tertiary); min-width:50px; text-align:right; }

/* ── Heatmap ── */
.heatmap { display:flex; gap:2px; flex-wrap:wrap; margin-top:6px; }
.heatmap-cell { width:16px; height:16px; border-radius:3px; transition:background 0.2s; cursor:default; position:relative; }
.heatmap-cell:hover::after { content:attr(data-tip); position:absolute; bottom:120%; left:50%; transform:translateX(-50%); padding:3px 6px; background:var(--c-surface-card); border:1px solid var(--c-hairline); border-radius:3px; font-size:8px; color:var(--c-text-secondary); white-space:nowrap; z-index:10; pointer-events:none; }

/* ── Template preview ── */
.template-preview { padding:12px 14px; border:1px solid var(--c-hairline); border-radius:var(--r-md); background:var(--c-surface-elevated); margin-top:8px; }
.template-preview-title { font-size:12px; font-weight:500; color:var(--c-text-primary); margin-bottom:6px; }
.template-preview-row { font-size:10px; color:var(--c-text-tertiary); display:flex; gap:6px; margin-bottom:3px; }
.template-preview-label { color:var(--c-text-quaternary); min-width:60px; }

/* ── Roles ── */
.role-select { display:flex; gap:4px; margin-top:4px; }
.role-badge { font-size:8px; padding:2px 6px; border-radius:var(--r-sm); cursor:pointer; border:1px solid var(--c-hairline); transition:all 0.15s; }
.role-badge.active { border-color:var(--c-hairline-strong); background:var(--c-surface-elevated); color:var(--c-text-primary); }
.role-badge:hover { border-color:var(--c-hairline-strong); }

/* ── Action status ── */
.action-status-select { font-size:9px; padding:2px 4px; border:1px solid var(--c-hairline); border-radius:3px; background:var(--c-surface-elevated); color:var(--c-text-secondary); cursor:pointer; }

/* ── Compare ── */
.compare-grid { display:grid; gap:16px; }
.compare-card { border:1px solid var(--c-hairline); border-radius:var(--r-md); padding:14px; background:var(--c-surface); }
.compare-card h3 { font-size:12px; font-weight:500; color:var(--c-text-primary); margin-bottom:8px; }

/* ── Recurring ── */
.recurring-toggle { display:flex; align-items:center; gap:8px; margin-top:6px; }
.recurring-toggle input[type="checkbox"] { accent-color:var(--c-primary); }

/* ── Export format ── */
.export-dropdown { position:relative; display:inline-block; }
.export-menu { position:absolute; top:100%; right:0; margin-top:4px; background:var(--c-surface-card); border:1px solid var(--c-hairline); border-radius:var(--r-sm); padding:4px; z-index:20; min-width:120px; }
.export-menu-item { display:block; padding:6px 10px; font-size:10px; color:var(--c-text-secondary); cursor:pointer; border-radius:3px; width:100%; text-align:left; border:none; background:none; font-family:var(--font); }
.export-menu-item:hover { background:var(--c-surface-elevated); color:var(--c-text-primary); }

/* ── Meeting Table ── */
.meeting-table-section { border:1px solid var(--c-hairline); border-radius:var(--r-md); padding:16px; margin-bottom:12px; background:var(--c-surface); transition:border-color 0.15s; overflow:hidden; }
.meeting-table-section:hover { border-color:var(--c-hairline-strong); }
.meeting-table-toggle { display:flex; align-items:center; gap:6px; cursor:pointer; user-select:none; }
.meeting-table-toggle-icon { transition:transform 0.2s ease; font-size:10px; color:var(--c-text-quaternary); }
.meeting-table-toggle-icon.open { transform:rotate(90deg); }
.meeting-table-container { overflow:auto; padding:12px 0 4px; display:flex; justify-content:center; }
.meeting-table-wrapper { position:relative; min-height:120px; }
.meeting-table-surface { transition:width 0.3s ease, height 0.3s ease; }
.meeting-table-seat { will-change:transform; }
.meeting-table-seat:hover { z-index:5; }
.meeting-table-tooltip { font-family:var(--font); }
.meeting-table-pulse-ring { animation:meetingTablePulse 2s ease-in-out infinite; }

/* ── Toolbar table toggle ── */
.btn-table-toggle { position:relative; }
.btn-table-toggle.active { border-color:var(--c-hairline-strong); color:var(--c-text-primary); background:var(--c-surface-elevated); }

/* ── Table animations ── */
@keyframes meetingTablePulse {
  0%,100% { opacity:0.4; transform:scale(1); }
  50% { opacity:1; transform:scale(1.05); }
}
@keyframes meetingTableTurnPulse {
  0%,100% { opacity:0.3; }
  50% { opacity:0.8; }
}
@keyframes meetingTableSeatIn {
  0% { opacity:0; transform:scale(0.3); }
  100% { opacity:1; transform:scale(1); }
}
@keyframes meetingTableSeatOut {
  0% { opacity:1; transform:scale(1); }
  100% { opacity:0; transform:scale(0.3); }
}

/* ── Responsive ── */
@media (max-width:768px) {
  .meeting-table-wrapper { transform:scale(0.85); transform-origin:center center; }
}
@media (max-width:560px) {
  .meeting-table-wrapper { transform:scale(0.7); transform-origin:center center; }
}

</style>
