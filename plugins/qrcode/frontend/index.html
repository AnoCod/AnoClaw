<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator</title>
<script src="/vendor/jszip.min.js"></script>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #222240;
    --surface-hover: #2a2a50;
    --text: #e0e0f0;
    --text-dim: #8888aa;
    --border: #3a3a5a;
    --accent: #6c5ce7;
    --accent-hover: #7c6cf7;
    --input-bg: #16162a;
    --success: #00d68f;
    --danger: #ff6b6b;
    --warning: #ffa502;
    --radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 20px;
  }

  .container {
    max-width: 560px;
    margin: 0 auto;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 16px;
    flex: 1;
    overflow: hidden;
  }

  h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  h1 small {
    font-size: 12px;
    font-weight: 400;
    color: var(--text-dim);
  }

  /* ── Header row with theme toggle ── */
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .theme-toggle {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 12px;
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .theme-toggle:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }

  .tab-btn {
    flex: 1;
    padding: 10px 16px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .tab-panel { display: none; flex: 1; flex-direction: column; gap: 12px; min-height: 0; }
  .tab-panel.active { display: flex; }

  /* ── Forms ── */
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-group label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  textarea, select, input[type="number"] {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus, select:focus, input:focus {
    border-color: var(--accent);
  }

  textarea {
    resize: vertical;
    min-height: 70px;
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }

  .options-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }

  /* ── Size Presets ── */
  .size-presets {
    display: flex;
    gap: 6px;
    margin-top: 2px;
  }

  .size-preset-btn {
    flex: 1;
    padding: 6px 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-dim);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .size-preset-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .size-preset-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* ── ECC Visual Indicator ── */
  .ecc-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 2px;
  }

  .ecc-bar-bg {
    flex: 1;
    height: 6px;
    background: var(--input-bg);
    border-radius: 3px;
    overflow: hidden;
  }

  .ecc-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s, background 0.3s;
  }

  .ecc-bar-fill.low { width: 25%; background: var(--success); }
  .ecc-bar-fill.medium { width: 50%; background: var(--warning); }
  .ecc-bar-fill.quartile { width: 75%; background: #a29bfe; }
  .ecc-bar-fill.high { width: 100%; background: var(--accent); }

  .ecc-label {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    min-width: 28px;
  }

  /* ── Styling Options ── */
  .style-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .style-option-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .style-option-group label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .style-options {
    display: flex;
    gap: 4px;
  }

  .style-opt-btn {
    flex: 1;
    padding: 6px 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-dim);
    font-size: 10px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .style-opt-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .style-opt-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* ── Color Pickers ── */
  .color-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .color-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .color-group label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .color-input-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 10px;
    transition: border-color 0.2s;
  }

  .color-input-wrap:focus-within {
    border-color: var(--accent);
  }

  .color-input-wrap input[type="color"] {
    width: 32px;
    height: 32px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    background: none;
    padding: 0;
  }

  .color-input-wrap input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  .color-input-wrap input[type="color"]::-webkit-color-swatch { border-radius: 4px; border: 1px solid var(--border); }

  .color-input-wrap input[type="text"] {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-size: 13px;
    font-family: 'SFMono-Regular', Consolas, monospace;
    outline: none;
    padding: 4px 0;
    min-width: 0;
  }

  /* ── Buttons ── */
  .btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn:hover { background: var(--accent-hover); }
  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    background: var(--surface);
    color: var(--text-dim);
  }

  .btn-row {
    display: flex;
    gap: 8px;
  }

  .btn-row .btn { flex: 1; }

  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    background: var(--surface-hover);
    border-color: var(--accent);
  }

  .btn-danger {
    background: var(--danger);
    color: white;
    border: none;
    font-size: 12px;
    padding: 6px 12px;
  }

  .btn-danger:hover { opacity: 0.85; }

  .btn-small {
    padding: 6px 12px;
    font-size: 12px;
  }

  /* ── Result Area with preview animation ── */
  .result-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 20px;
    min-height: 200px;
    position: relative;
  }

  #qrPreview {
    max-width: 100%;
    max-height: 100%;
    display: none;
    image-rendering: pixelated;
  }

  #qrPreview.animate-in {
    animation: qrFadeIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  @keyframes qrFadeIn {
    0% {
      opacity: 0;
      transform: scale(0.85);
    }
    100% {
      opacity: 1;
      transform: scale(1);
    }
  }

  #qrPlaceholder {
    color: var(--text-dim);
    font-size: 14px;
    text-align: center;
  }

  #qrPlaceholder .icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.3;
  }

  .result-area.has-qr {
    border-style: solid;
    border-color: var(--success);
  }

  /* ── Validation Indicator ── */
  .validation-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    margin-top: 8px;
    animation: qrFadeIn 0.3s ease forwards;
  }

  .validation-badge.high { background: rgba(0, 214, 143, 0.15); color: var(--success); }
  .validation-badge.medium { background: rgba(255, 165, 2, 0.15); color: var(--warning); }
  .validation-badge.low { background: rgba(255, 107, 107, 0.15); color: var(--danger); }

  /* ── Recent QR Codes Quick-Access ── */
  .recent-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 4px 0;
    scrollbar-width: thin;
  }

  .recent-row::-webkit-scrollbar { height: 4px; }
  .recent-row::-webkit-scrollbar-track { background: transparent; }
  .recent-row::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .recent-item {
    flex-shrink: 0;
    width: 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .recent-item:hover { transform: scale(1.05); }

  .recent-thumb {
    width: 56px;
    height: 56px;
    border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 4px;
  }

  .recent-thumb img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    image-rendering: pixelated;
  }

  .recent-label {
    font-size: 9px;
    color: var(--text-dim);
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 100%;
  }

  /* ── Batch Mode ── */
  .batch-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .batch-toggle label {
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
  }

  .toggle-switch {
    position: relative;
    width: 36px;
    height: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .toggle-switch.active {
    background: var(--accent);
    border-color: var(--accent);
  }

  .toggle-switch::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    background: white;
    border-radius: 50%;
    transition: transform 0.2s;
  }

  .toggle-switch.active::after {
    transform: translateX(16px);
  }

  .batch-input {
    display: none;
  }

  .batch-input.active {
    display: block;
  }

  .single-input.hidden {
    display: none;
  }

  .batch-actions {
    display: none;
    gap: 8px;
  }

  .batch-actions.active {
    display: flex;
  }

  .batch-actions .btn {
    flex: 1;
    font-size: 12px;
    padding: 8px 12px;
  }

  .batch-progress {
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    padding: 4px;
    display: none;
  }

  /* ── Stats ── */
  .stats {
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    padding: 6px;
  }

  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── History Panel ── */
  .history-panel {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .history-item:hover {
    border-color: var(--accent);
    background: var(--surface-hover);
  }

  .history-item .preview {
    width: 40px;
    height: 40px;
    border-radius: 4px;
    background: var(--input-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: var(--text-dim);
    flex-shrink: 0;
    overflow: hidden;
  }

  .history-item .preview img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    image-rendering: pixelated;
  }

  .history-item .info {
    flex: 1;
    min-width: 0;
  }

  .history-item .text {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 320px;
  }

  .history-item .meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .history-item .time {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .history-empty {
    text-align: center;
    color: var(--text-dim);
    padding: 40px 20px;
    font-size: 14px;
  }

  .history-empty .icon {
    font-size: 32px;
    margin-bottom: 12px;
    opacity: 0.3;
  }

  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .history-header .count {
    font-size: 12px;
    color: var(--text-dim);
  }

  /* ── Config Panel ── */
  .config-section {
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 4px 0;
  }

  .config-section h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .config-save-msg {
    font-size: 12px;
    color: var(--success);
    text-align: center;
    padding: 4px;
    display: none;
  }

  /* ── Theme sync ── */
  [data-theme="light"] {
    --bg: #f5f5fa;
    --surface: #ffffff;
    --surface-hover: #eeeeff;
    --text: #222240;
    --text-dim: #8888aa;
    --border: #ddddee;
    --input-bg: #f0f0f8;
    --danger: #e74c3c;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header-row">
    <h1>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="4" height="4" rx="1"/>
        <rect x="3" y="17" width="4" height="4" rx="1"/>
        <rect x="17" y="3" width="4" height="4" rx="1"/>
        <rect x="17" y="17" width="4" height="4" rx="1"/>
        <rect x="9" y="9" width="2" height="2" rx="0.5"/>
        <rect x="13" y="13" width="2" height="2" rx="0.5"/>
        <line x1="7" y1="12" x2="9" y2="12"/><line x1="15" y1="12" x2="17" y2="12"/>
        <line x1="12" y1="7" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="17"/>
      </svg>
      QR Code Generator
      <small>plugin</small>
    </h1>
    <button class="theme-toggle" id="themeToggle" title="Toggle dark/light theme">
      <span id="themeIcon">&#9790;</span>
      <span id="themeLabel">Dark</span>
    </button>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="generate">Generate</button>
    <button class="tab-btn" data-tab="history">History</button>
    <button class="tab-btn" data-tab="settings">Settings</button>
  </div>

  <!-- ═══ GENERATE TAB ═══ -->
  <div class="tab-panel active" id="tab-generate">
    <!-- Batch Mode Toggle -->
    <div class="batch-toggle">
      <div class="toggle-switch" id="batchToggle"></div>
      <label for="batchToggle">Batch mode (one per line)</label>
    </div>

    <!-- Single Input -->
    <div class="form-group single-input" id="singleInputWrap">
      <label for="textInput">Content</label>
      <textarea id="textInput" placeholder="Enter text, URL, or any data to encode...">https://anoclaw.dev</textarea>
    </div>

    <!-- Batch Input -->
    <div class="form-group batch-input" id="batchInputWrap">
      <label for="batchTextInput">Content (one QR code per line, max 100)</label>
      <textarea id="batchTextInput" rows="6" placeholder="https://example.com&#10;Hello World&#10;1234567890" style="min-height: 120px;"></textarea>
    </div>

    <!-- Size Presets -->
    <div class="form-group">
      <label>Size Presets</label>
      <div class="size-presets" id="sizePresets">
        <button class="size-preset-btn" data-size="256">256</button>
        <button class="size-preset-btn active" data-size="512">512</button>
        <button class="size-preset-btn" data-size="1024">1024</button>
        <button class="size-preset-btn" data-size="2048">2048</button>
      </div>
    </div>

    <div class="options-row">
      <div class="form-group">
        <label for="sizeInput">Size (px)</label>
        <input type="number" id="sizeInput" value="512" min="64" max="2048" step="64">
      </div>
      <div class="form-group">
        <label for="eccSelect">Error Correction</label>
        <select id="eccSelect">
          <option value="L">L (7%)</option>
          <option value="M" selected>M (15%)</option>
          <option value="Q">Q (25%)</option>
          <option value="H">H (30%)</option>
        </select>
        <div class="ecc-indicator">
          <div class="ecc-bar-bg"><div class="ecc-bar-fill medium" id="eccBarFill"></div></div>
          <span class="ecc-label" id="eccLabel">15%</span>
        </div>
      </div>
      <div class="form-group">
        <label for="marginInput">Margin</label>
        <input type="number" id="marginInput" value="4" min="0" max="20">
      </div>
    </div>

    <!-- Styling Options -->
    <div class="style-row">
      <div class="style-option-group">
        <label>Dot Style</label>
        <div class="style-options" id="dotStyleOptions">
          <button class="style-opt-btn active" data-value="square">Square</button>
          <button class="style-opt-btn" data-value="rounded">Rounded</button>
          <button class="style-opt-btn" data-value="dots">Dots</button>
        </div>
      </div>
      <div class="style-option-group">
        <label>Corner Style</label>
        <div class="style-options" id="cornerStyleOptions">
          <button class="style-opt-btn active" data-value="square">Square</button>
          <button class="style-opt-btn" data-value="rounded">Rounded</button>
          <button class="style-opt-btn" data-value="extra-rounded">Extra</button>
        </div>
      </div>
    </div>

    <div class="color-row">
      <div class="color-group">
        <label for="darkColorInput">Dark Color</label>
        <div class="color-input-wrap">
          <input type="color" id="darkColorPicker" value="#000000">
          <input type="text" id="darkColorInput" value="#000000" maxlength="7" spellcheck="false">
        </div>
      </div>
      <div class="color-group">
        <label for="lightColorInput">Light Color</label>
        <div class="color-input-wrap">
          <input type="color" id="lightColorPicker" value="#ffffff">
          <input type="text" id="lightColorInput" value="#ffffff" maxlength="7" spellcheck="false">
        </div>
      </div>
    </div>

    <!-- Generate + Download Buttons -->
    <div class="btn-row">
      <button class="btn" id="generateBtn">
        <span id="btnText">Generate</span>
        <div class="spinner" id="spinner"></div>
      </button>
      <button class="btn btn-secondary" id="downloadBtn" disabled>Download</button>
      <button class="btn btn-secondary" id="svgBtn" disabled>SVG</button>

    <div class="batch-actions" id="batchActions">

    <!-- Recent QR Codes Quick-Access -->

  <!-- ═══ HISTORY TAB ═══ -->

    </div>
    <div class="history-panel" id="historyPanel">
      <div class="history-empty" id="historyEmpty">
        <div class="icon">&#128203;</div>
        <div>No QR codes generated yet</div>
      </div>
      <div class="history-list" id="historyList"></div>

  <!-- ═══ SETTINGS TAB ═══ -->
  <div class="tab-panel" id="tab-settings">
    <div class="config-section">
      <h3>Default Generation Settings</h3>
      <div class="options-row">
        <div class="form-group">
          <label for="cfgDefaultSize">Default Size (px)</label>
          <input type="number" id="cfgDefaultSize" min="64" max="2048" step="64">

          <label for="cfgErrorCorrection">Default ECC</label>

            <option value="L">L (7%)</option>

            <option value="Q">Q (25%)</option>
            <option value="H">H (30%)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="cfgHistoryLimit">History Limit</label>
          <input type="number" id="cfgHistoryLimit" min="1" max="500">
        </div>

    <div class="config-section">
      <h3>Default Colors</h3>

          <label>Default Dark Color</label>

          </div>
        </div>
        <div class="color-group">
          <label>Default Light Color</label>
          <div class="color-input-wrap">
            <input type="color" id="cfgLightColorPicker" value="#ffffff">
            <input type="text" id="cfgLightColorInput" value="#ffffff" maxlength="7" spellcheck="false">
          </div>
        </div>

      <h3>Default Styling</h3>
      <div class="style-row">
        <div class="style-option-group">

            <button class="style-opt-btn active" data-value="square">Square</button>
            <button class="style-opt-btn" data-value="rounded">Rounded</button>
            <button class="style-opt-btn" data-value="dots">Dots</button>
          </div>
        </div>
        <div class="style-option-group">
          <label>Default Corner Style</label>
          <div class="style-options" id="cfgCornerStyleOptions">
            <button class="style-opt-btn active" data-value="square">Square</button>
            <button class="style-opt-btn" data-value="rounded">Rounded</button>
            <button class="style-opt-btn" data-value="extra-rounded">Extra</button>
          </div>
        </div>

    <button class="btn" id="saveConfigBtn">Save Settings</button>
    <div class="config-save-msg" id="configSaveMsg">Settings saved!</div>

</div>

<script>
// ── Theme sync from parent ──
window.addEventListener('message', (event) => {
  if (event.data?.type === 'anoclaw:theme') {
    document.documentElement.setAttribute('data-theme', event.data.theme);
    updateThemeUI(event.data.theme);
  }
});

// ── Theme Toggle ──
let currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';

function updateThemeUI(theme) {
  currentTheme = theme;
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeIcon').textContent = theme === 'dark' ? '\u263E' : '\u2600';
  document.getElementById('themeLabel').textContent = theme === 'dark' ? 'Dark' : 'Light';
}

document.getElementById('themeToggle').addEventListener('click', () => {
  const next = currentTheme === 'dark' ? 'light' : 'dark';
  updateThemeUI(next);
  // Notify parent frame
  try {
    window.parent.postMessage({ type: 'anoclaw:theme', theme: next }, '*');
  } catch {}
});

// ── Color picker <-> text input sync helper ──
function bindColorPair(pickerId, textId) {
  const picker = document.getElementById(pickerId);
  const text = document.getElementById(textId);
  picker.addEventListener('input', () => { text.value = picker.value; });
  text.addEventListener('input', () => {
    if (/^#[0-9a-fA-F]{6}$/.test(text.value)) {
      picker.value = text.value;
    }
  });
  text.addEventListener('blur', () => {
    if (!/^#[0-9a-fA-F]{6}$/.test(text.value)) {
      text.value = picker.value;
    }
  });
}

// Generate tab color pairs
bindColorPair('darkColorPicker', 'darkColorInput');
bindColorPair('lightColorPicker', 'lightColorInput');

// Settings tab color pairs
bindColorPair('cfgDarkColorPicker', 'cfgDarkColorInput');
bindColorPair('cfgLightColorPicker', 'cfgLightColorInput');

// ── Style Option Groups ──
function initStyleGroup(containerId, onChange) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.querySelectorAll('.style-opt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      container.querySelectorAll('.style-opt-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (onChange) onChange(btn.dataset.value);
    });
  });
}

// Generate tab style groups
let selectedDotStyle = 'square';
let selectedCornerStyle = 'square';

initStyleGroup('dotStyleOptions', (val) => { selectedDotStyle = val; });
initStyleGroup('cornerStyleOptions', (val) => { selectedCornerStyle = val; });

// Settings tab style groups
let cfgDotStyle = 'square';
let cfgCornerStyle = 'square';
initStyleGroup('cfgDotStyleOptions', (val) => { cfgDotStyle = val; });
initStyleGroup('cfgCornerStyleOptions', (val) => { cfgCornerStyle = val; });

function setActiveStyleOption(containerId, value) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.querySelectorAll('.style-opt-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.value === value);
  });
}

// ── DOM refs ──
const textInput = document.getElementById('textInput');
const batchTextInput = document.getElementById('batchTextInput');
const sizeInput = document.getElementById('sizeInput');
const eccSelect = document.getElementById('eccSelect');
const marginInput = document.getElementById('marginInput');
const darkColorInput = document.getElementById('darkColorInput');
const lightColorInput = document.getElementById('lightColorInput');
const darkColorPicker = document.getElementById('darkColorPicker');
const lightColorPicker = document.getElementById('lightColorPicker');
const generateBtn = document.getElementById('generateBtn');
const btnText = document.getElementById('btnText');
const spinner = document.getElementById('spinner');
const downloadBtn = document.getElementById('downloadBtn');
const svgBtn = document.getElementById('svgBtn');
const qrPreview = document.getElementById('qrPreview');
const qrPlaceholder = document.getElementById('qrPlaceholder');
const resultArea = document.getElementById('resultArea');
const stats = document.getElementById('stats');

let currentDataUrl = '';
let currentSvg = '';
let batchResults = []; // For batch export

// ── ECC Visual Indicator ──
const eccInfo = {
  L: { pct: 7, cls: 'low' },
  M: { pct: 15, cls: 'medium' },
  Q: { pct: 25, cls: 'quartile' },
  H: { pct: 30, cls: 'high' },
};

function updateEccIndicator() {
  const val = eccSelect.value;
  const info = eccInfo[val] || eccInfo.M;
  const bar = document.getElementById('eccBarFill');
  const label = document.getElementById('eccLabel');
  bar.className = 'ecc-bar-fill ' + info.cls;
  label.textContent = info.pct + '%';
}

eccSelect.addEventListener('change', updateEccIndicator);
updateEccIndicator();

// ── Size Presets ──
document.querySelectorAll('.size-preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.size-preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    sizeInput.value = btn.dataset.size;
  });
});

sizeInput.addEventListener('input', () => {
  const v = sizeInput.value;
  document.querySelectorAll('.size-preset-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.size === v);
  });
});

// ── Batch Mode Toggle ──
let batchMode = false;
const batchToggleBtn = document.getElementById('batchToggle');
const singleInputWrap = document.getElementById('singleInputWrap');
const batchInputWrap = document.getElementById('batchInputWrap');
const batchActions = document.getElementById('batchActions');
const batchExportZipBtn = document.getElementById('batchExportZipBtn');
const batchClearBtn = document.getElementById('batchClearBtn');
const batchProgress = document.getElementById('batchProgress');

batchToggleBtn.addEventListener('click', () => {
  batchMode = !batchMode;
  batchToggleBtn.classList.toggle('active', batchMode);
  singleInputWrap.classList.toggle('hidden', batchMode);
  batchInputWrap.classList.toggle('active', batchMode);
  batchActions.classList.toggle('active', batchMode);
  if (!batchMode) {
    batchResults = [];
    batchExportZipBtn.disabled = true;
  }
});

// ── Tabs ──
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'history') loadHistory();
    if (btn.dataset.tab === 'settings') loadConfig();
  });
});

// ── Preview Animation Helper ──
function animatePreview() {
  qrPreview.classList.remove('animate-in');
  // Force reflow to restart animation
  void qrPreview.offsetWidth;
  qrPreview.classList.add('animate-in');
}

// ── Validation Badge ──
function showValidationBadge(result) {
  const badge = document.getElementById('validationBadge');
  if (!result || !result.valid) {
    badge.innerHTML = '';
    return;
  }
  const rel = result.scanReliability || 'medium';
  const icons = { high: '\u2713', medium: '\u25CF', low: '\u26A0' };
  const labels = { high: 'High reliability', medium: 'Medium reliability', low: 'Low reliability - increase ECC' };
  badge.innerHTML = `<span class="validation-badge ${rel}">${icons[rel]} ${labels[rel]}</span>`;
}

// ── Generate ──
generateBtn.addEventListener('click', generateQR);

async function generateQR() {
  if (batchMode) {
    return generateBatch();
  }

  const text = textInput.value.trim();
  if (!text) { textInput.focus(); return; }

  btnText.textContent = 'Generating';
  spinner.style.display = 'inline-block';
  generateBtn.disabled = true;
  downloadBtn.disabled = true;
  svgBtn.disabled = true;

  try {
    const pngResp = await fetch('/api/v1/plugins/qrcode/generate?' + new URLSearchParams({
      text,
      size: sizeInput.value,
      errorCorrection: eccSelect.value,
      margin: marginInput.value,
      darkColor: darkColorInput.value,
      lightColor: lightColorInput.value,
    }));
    const pngData = await pngResp.json();

    if (pngData.error) throw new Error(pngData.error);

    const svgResp = await fetch('/api/v1/plugins/qrcode/generate?format=svg&text=' + encodeURIComponent(text) + '&errorCorrection=' + eccSelect.value);
    const svgData = await svgResp.json();

    if (pngData.dataUrl) {
      currentDataUrl = pngData.dataUrl;
      currentSvg = svgData.svg || '';
      qrPreview.src = currentDataUrl;
      qrPreview.style.display = 'block';
      qrPlaceholder.style.display = 'none';
      resultArea.classList.add('has-qr');
      downloadBtn.disabled = false;
      svgBtn.disabled = !currentSvg;

      // Trigger preview animation
      animatePreview();

      const len = new TextEncoder().encode(text).length;
      stats.textContent = `${len} bytes \u00B7 ${sizeInput.value}\u00D7${sizeInput.value}px \u00B7 ECC ${eccSelect.value} \u00B7 ${darkColorInput.value}/${lightColorInput.value}`;

      // Validate the QR code
      try {
        const valResp = await fetch('/api/v1/plugins/qrcode/validate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, errorCorrection: eccSelect.value }),
        });
        const valData = await valResp.json();
        showValidationBadge(valData);
      } catch {
        // Validation is non-critical
      }

      // Update recent row
      addRecentItem(text, currentDataUrl);
    }
  } catch (err) {
    stats.textContent = 'Error: ' + err.message;
  } finally {
    btnText.textContent = 'Generate';
    spinner.style.display = 'none';
    generateBtn.disabled = false;
  }
}

// ── Batch Generate ──
async function generateBatch() {
  const raw = batchTextInput.value.trim();
  if (!raw) { batchTextInput.focus(); return; }

  const items = raw.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  if (items.length === 0) return;
  if (items.length > 100) {
    batchProgress.textContent = 'Max 100 items allowed';
    batchProgress.style.display = 'block';
    batchProgress.style.color = 'var(--danger)';
    return;
  }

  btnText.textContent = `Generating ${items.length}...`;
  spinner.style.display = 'inline-block';
  generateBtn.disabled = true;
  batchProgress.textContent = `Generating ${items.length} QR codes...`;
  batchProgress.style.display = 'block';
  batchProgress.style.color = 'var(--text-dim)';

  try {
    const resp = await fetch('/api/v1/plugins/qrcode/batch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        items,
        size: parseInt(sizeInput.value, 10),
        errorCorrection: eccSelect.value,
        margin: parseInt(marginInput.value, 10),
        darkColor: darkColorInput.value,
        lightColor: lightColorInput.value,
      }),
    });
    const data = await resp.json();

    if (data.error) throw new Error(data.error);

    batchResults = data.results || [];
    const successCount = batchResults.filter(r => r.dataUrl || r.svg).length;
    const errorCount = batchResults.filter(r => r.error).length;

    batchProgress.textContent = `Done: ${successCount} generated` + (errorCount > 0 ? `, ${errorCount} failed` : '');
    batchProgress.style.color = errorCount > 0 ? 'var(--warning)' : 'var(--success)';

    batchExportZipBtn.disabled = successCount === 0;

    // Show first result in preview
    if (batchResults.length > 0) {
      const first = batchResults.find(r => r.dataUrl);
      if (first) {
        currentDataUrl = first.dataUrl;
        qrPreview.src = currentDataUrl;
        qrPreview.style.display = 'block';
        qrPlaceholder.style.display = 'none';
        resultArea.classList.add('has-qr');
        animatePreview();
      }
    }
  } catch (err) {
    batchProgress.textContent = 'Error: ' + err.message;
    batchProgress.style.color = 'var(--danger)';
  } finally {
    btnText.textContent = 'Generate';
    spinner.style.display = 'none';
    generateBtn.disabled = false;
  }
}

// ── Batch Export as ZIP ──
batchExportZipBtn.addEventListener('click', async () => {
  if (!batchResults.length) return;

  const zip = new JSZip();
  const folder = zip.folder('qr-codes');
  let idx = 0;

  for (const r of batchResults) {
    if (r.dataUrl) {
      // PNG: strip data URL prefix, decode base64
      const base64 = r.dataUrl.split(',')[1];
      const name = `qr-${String(idx + 1).padStart(3, '0')}.png`;
      folder.file(name, base64, { base64: true });
      idx++;
    } else if (r.svg) {
      const name = `qr-${String(idx + 1).padStart(3, '0')}.svg`;
      folder.file(name, r.svg);
      idx++;
    }
  }

  if (idx === 0) return;

  try {
    const blob = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.download = `qrcode-batch-${Date.now()}.zip`;
    link.href = url;
    link.click();
    URL.revokeObjectURL(url);
  } catch (err) {
    alert('Failed to create ZIP: ' + err.message);
  }
});

// ── Batch Clear ──
batchClearBtn.addEventListener('click', () => {
  batchTextInput.value = '';
  batchResults = [];
  batchExportZipBtn.disabled = true;
  batchProgress.style.display = 'none';
});

// ── Download PNG ──
downloadBtn.addEventListener('click', () => {
  if (!currentDataUrl) return;
  const link = document.createElement('a');
  link.download = `qrcode-${Date.now()}.png`;
  link.href = currentDataUrl;
  link.click();
});

// ── Copy SVG ──
svgBtn.addEventListener('click', async () => {
  if (!currentSvg) return;
  try {
    await navigator.clipboard.writeText(currentSvg);
    const orig = svgBtn.textContent;
    svgBtn.textContent = 'Copied!';
    setTimeout(() => { svgBtn.textContent = orig; }, 1500);
  } catch {
    alert('SVG copied to clipboard');
  }
});

// ── Ctrl+Enter shortcut ──
textInput.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'Enter') generateQR();
});

batchTextInput.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'Enter') generateQR();
});

// ── Recent QR Codes Quick-Access ──
let recentItems = []; // { text, dataUrl }

function addRecentItem(text, dataUrl) {
  // Remove duplicate
  recentItems = recentItems.filter(r => r.text !== text);
  recentItems.unshift({ text, dataUrl });
  if (recentItems.length > 8) recentItems = recentItems.slice(0, 8);
  renderRecent();
}

function renderRecent() {
  const row = document.getElementById('recentRow');
  if (recentItems.length === 0) {
    row.innerHTML = '<div style="color: var(--text-dim); font-size: 12px; padding: 10px;">No recent codes yet</div>';
    return;
  }

  row.innerHTML = recentItems.map((item, i) => {
    const label = item.text.length > 12 ? item.text.slice(0, 12) + '...' : item.text;
    return `<div class="recent-item" data-index="${i}">
      <div class="recent-thumb"><img src="${item.dataUrl}" alt="QR"></div>
      <div class="recent-label" title="${escapeHtml(item.text)}">${escapeHtml(label)}</div>
    </div>`;
  }).join('');

  row.querySelectorAll('.recent-item').forEach(el => {
    el.addEventListener('click', () => {
      const item = recentItems[parseInt(el.dataset.index)];
      if (item) {
        textInput.value = item.text;
        currentDataUrl = item.dataUrl;
        qrPreview.src = currentDataUrl;
        qrPreview.style.display = 'block';
        qrPlaceholder.style.display = 'none';
        resultArea.classList.add('has-qr');
        downloadBtn.disabled = false;
        animatePreview();
        // Switch to generate tab
        document.querySelector('[data-tab="generate"]').click();
      }
    });
  });
}

// ═══ HISTORY ═══

async function loadHistory() {
  try {
    const resp = await fetch('/api/v1/plugins/qrcode/history');
    const data = await resp.json();
    renderHistory(data.entries || [], data.generateCount || 0);
  } catch (err) {
    document.getElementById('historyCount').textContent = 'Error loading history';
  }
}

function renderHistory(entries, totalCount) {
  const list = document.getElementById('historyList');
  const empty = document.getElementById('historyEmpty');
  const count = document.getElementById('historyCount');

  count.textContent = entries.length > 0
    ? `${entries.length} entries \u00B7 ${totalCount} total generated`
    : `0 entries \u00B7 ${totalCount} total generated`;

  if (entries.length === 0) {
    empty.style.display = 'block';
    list.innerHTML = '';
    return;
  }

  empty.style.display = 'none';
  list.innerHTML = entries.map(entry => {
    const time = new Date(entry.generatedAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const date = new Date(entry.generatedAt).toLocaleDateString([], { month: 'short', day: 'numeric' });
    const textPreview = entry.text.length > 40 ? entry.text.slice(0, 40) + '...' : entry.text;
    const colorDot = entry.format === 'svg'
      ? '<span style="color:var(--accent)">&#9654;</span>'
      : `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${entry.darkColor || '#000'};border:1px solid var(--border)"></span>`;
    const meta = entry.format.toUpperCase()
      + (entry.size ? ` \u00B7 ${entry.size}px` : '')
      + ` \u00B7 ECC ${entry.errorCorrection}`;

    return `<div class="history-item" data-text="${encodeURIComponent(entry.text)}" data-format="${entry.format}">
      <div class="preview">${colorDot}</div>
      <div class="info">
        <div class="text">${escapeHtml(textPreview)}</div>
        <div class="meta">${meta}</div>
      </div>
      <div class="time">${date} ${time}</div>
    </div>`;
  }).join('');

  // Click to re-use
  list.querySelectorAll('.history-item').forEach(item => {
    item.addEventListener('click', () => {
      textInput.value = decodeURIComponent(item.dataset.text);
      // Switch to generate tab
      document.querySelector('[data-tab="generate"]').click();
      generateQR();
    });
  });
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// Clear history
document.getElementById('clearHistoryBtn').addEventListener('click', async () => {
  try {
    await fetch('/api/v1/plugins/qrcode/history', { method: 'DELETE' });
    loadHistory();
  } catch {}
});

// ═══ SETTINGS ═══

async function loadConfig() {
  try {
    const resp = await fetch('/api/v1/plugins/qrcode/config');
    const cfg = await resp.json();

    document.getElementById('cfgDefaultSize').value = cfg.defaultSize || 256;
    document.getElementById('cfgErrorCorrection').value = cfg.errorCorrection || 'M';
    document.getElementById('cfgHistoryLimit').value = cfg.historyLimit || 50;

    document.getElementById('cfgDarkColorPicker').value = cfg.darkColor || '#000000';
    document.getElementById('cfgDarkColorInput').value = cfg.darkColor || '#000000';
    document.getElementById('cfgLightColorPicker').value = cfg.lightColor || '#ffffff';
    document.getElementById('cfgLightColorInput').value = cfg.lightColor || '#ffffff';

    // Load style options
    cfgDotStyle = cfg.dotStyle || 'square';
    cfgCornerStyle = cfg.cornerStyle || 'square';
    setActiveStyleOption('cfgDotStyleOptions', cfgDotStyle);
    setActiveStyleOption('cfgCornerStyleOptions', cfgCornerStyle);
  } catch (err) {
    console.error('Failed to load config:', err);
  }
}

document.getElementById('saveConfigBtn').addEventListener('click', async () => {
  const cfg = {
    defaultSize: parseInt(document.getElementById('cfgDefaultSize').value, 10),
    errorCorrection: document.getElementById('cfgErrorCorrection').value,
    historyLimit: parseInt(document.getElementById('cfgHistoryLimit').value, 10),
    darkColor: document.getElementById('cfgDarkColorInput').value,
    lightColor: document.getElementById('cfgLightColorInput').value,
    dotStyle: cfgDotStyle,
    cornerStyle: cfgCornerStyle,
  };

  try {
    const resp = await fetch('/api/v1/plugins/qrcode/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(cfg),
    });
    const result = await resp.json();

    if (result.error) {
      alert('Error: ' + result.error);
      return;
    }

    // Sync generate tab defaults
    sizeInput.value = cfg.defaultSize;
    eccSelect.value = cfg.errorCorrection;
    updateEccIndicator();
    darkColorPicker.value = cfg.darkColor;
    darkColorInput.value = cfg.darkColor;
    lightColorPicker.value = cfg.lightColor;
    lightColorInput.value = cfg.lightColor;
    selectedDotStyle = cfg.dotStyle;
    selectedCornerStyle = cfg.cornerStyle;
    setActiveStyleOption('dotStyleOptions', cfg.dotStyle);
    setActiveStyleOption('cornerStyleOptions', cfg.cornerStyle);

    const msg = document.getElementById('configSaveMsg');
    msg.style.display = 'block';
    setTimeout(() => { msg.style.display = 'none'; }, 2000);
  } catch (err) {
    alert('Failed to save: ' + err.message);
  }
});

// ── Auto-generate on load ──
generateQR();
</script>
</body>
</html>
